front:
  text: 高上玉皇本行集經重刋道藏輯要高上玉皇本行集經
  hash: sha256:76ea29986dc9d0d6a0c3b22c4233fac9758f1dac19a5bd26bd900ec678c62516
  markers:
  - {type: page-break, offset: 8, content: '', id: CK-KZ_KR5i0015_02p001a}
body:
  text: 文昌帝君孚佑帝君合注持誦儀式凡誦經者必先齊沐盥潄嚴整衣冠至心誠意絶念忘情於淨室中思真如對或北面長跪或東向端坐然後朗誦淨心神咒太上台星應變無停驅邪縛魅保命護身智慧明淨心神安寧三魂永久魄無喪傾淨口神咒丹朱口神吐禾嵗丿除氛舌神正倫通命養神羅千齒神卻邪衛真喉神虎賁氣神引津心神丹元令我通真思神鍊液道氣常存淨身神咒靈寶天尊安慰身形法子魂魄五臟玄冥靑龍白虎隊仗紛紜朱雀玄武侍衛我真安土地神咒元始安鎮普告萬神嶽瀆真官土地祗靈左社右稷不得妄驚回向正道內外澄淸各安方位備守壇庭太上有命搜捕邪精護法神王保衛誦經皈依大道元亨利貞淨天地神咒天地自然禾嵗丿氣分散洞中玄虛晃朗太元八方威神使我自然靈寶符命普告九天乾羅怛那洞罡太玄斬妖縛邪度人萬千中山神咒元始玉文持誦一遍卻病延年按行五嶽八海知聞魔王束首侍衛我軒凶禾嵗丿消散道氣常存金光神咒天地玄宗萬氣本根廣修億劫證吾神通三界內外惟道獨尊體有金光覆映吾身視之不見聽之不聞包羅天地養育羣生誦持萬遍身有光明三界侍衛五帝司迎萬神朝禮役使雷霆鬼妖喪膽精怪亡形內有霹𩆝雷神隱名洞慧交徹五氣騰騰金光速現覆護真人祝香神咒道由心洽心假香傳香爇玉爐心存帝前真靈下盼仙斾臨軒令臣關告徑達三天集靈神咒琳琅振響世界肅淸河海靜默山嶽吞雲五靈合氣三辰吐芬昊天敕命召集羣真十方大帝兵馬紛紜率領部衆環列壇庭神王侍衛威將隨臨鬼精滅爽邪魔摧傾天無雜禾嵗丿地鮮妖氛空明洞慧上達玉京開經偈寂寂至無踪虛峙劫仭阿豁落洞玄文誰測此幽遐一入大乘路孰計年劫多不生亦不滅欲生因蓮花超凌三界途慈心解世羅真人無上德世世為仙家玉光普照天尊三稱長跪禮奉仰啓三淸境無上三寶尊仰啓大羅天無上玄穹主仰啓三淸界侍宸諸真衆妙道難思議造入資玄門妙經抉玄藴導引塵迷趣臣今淨三業口誦及心持惟願大慈悲開受臣所請慈光燭卑賤聰聽聆音聲願臣諷誦時響徹十方界成就一切願如經所稱述從此漸進修成道事諸聖仰啓上告也三淸境玉淸聖境上淸真境太淸仙境三寶尊元始為天寶尊道君為靈寶尊老君為神寶尊無上無可加也大羅天至大之天玄穹主諸天之主稱玉帝也帝居曰宸玉帝為萬天之尊則所居曰宸宜也諸真衆天真大聖神王靈童玉女皆是抉者决也如决水之流放乎四海也此言玉帝之至妙大道不可思議皆由真知力行造入玄妙之門也妙經謂此經也玄藴云者抉出玄奧之藴導引塵俗迷人脫其業趣也臣誦經者自稱也三業身口心之業也口中諷誦心中受持惟願玉帝垂大慈悲受其所請慈光照及卑賤神聰聆其音聲且願諷經之法音響徹十方諸界成就一切善願如經中所稱述而從此漸次進修得成大道以奉事三淸玉帝諸真衆也至心皈命禮至心乃誠恪不二之意世本作志心者非玉淸聖境淸微天宮鬱羅蕭臺之中森羅淨霐之上現有為之梵相具無極之神通敷演真玄破無有色空之礙拯提趣類絶智愚高下之分妙用難窺靈機罔測大悲大願大聖大慈無量度人元始天尊玉淸如玉之淸元始所處之境也淸者纎塵不染微者微渺無際元始所居之宮也芳鬱疏羅蕭然真淸元始所坐之臺也但見萬象森然羅列於下而其境其宮其臺淨霐幽深而處乎其上焉現有作為之妙相具無窮極之神通敷宣演說至真玄理點破世間一切障礙拯提世間一切品類有與色指現在言無與空指未來言四者皆心之纍智愚以姿質言高下以地位言拯提絶無分別也其妙用無方難以窺視其靈機活潑難以測度大悲憐世心切也大願志願無窮也大聖聖中之極也大慈撫育羣生也無量度人接引無限量也元大也始初也天尊諸天所共尊也至心皈命禮上淸真境禹餘天宮紫微瓊臺之中玄都玉京之上接元始虛皇之統系超西那玉國之根苗入黍米珠盡挹真玄之精粹在香林苑屢談祕要之筌蹄妙德難思神通莫擬大悲大願大聖大慈無量度人靈寶天尊處上淸至真之妙境居禹餘元白之天宮萬寶莊嚴高而莫並體元行化接元始虛皇之統系也西那玉國為玉帝降生處即光嚴妙樂國也靈寶天尊抱送玉帝是玉國根苗由靈寶天尊而超也黍米成珠盡挹真玄而得其精粹香林作苑屢談祕要而發其筌蹄妙德難以思維神通莫可比擬大悲大願大聖大慈無量度人是為靈寶天尊謂靈運道寶也至心皈命禮太淸仙境大赤天宮巍巍金闕之高渺渺瓊霄之上降生於無量數劫說法於萬二千天五千祕言融三才之妙道八十餘度接六趣之衆生聖德崇高玄功廣博大悲大願大聖大慈無量度人降生天尊太淸仙境玄光之顯著也大赤天宮彩霞之遍覆也巍巍乎金闕之高而無倫渺渺乎瓊霄之上而莫並化身無量數劫降生何其神也談道萬二千天說法何其廣也五千祕言融貫乎天地人三才之妙道八十一化接引乎天人魔鬼獄畜六等之衆生聖德崇高玄功廣博大悲大願大聖大慈無量度人是為降生天尊謂生生不息也至心皈命禮妙有真境彌羅上宮曩示現國王之身即根本帝尊之質始相湛寂實至玄至妙以難言嗣位繼傳妙無等無倫而相踵聖父之慈悲父至尊之最上尊稱讚難窮皈依莫盡大悲大願大聖大慈光嚴妙樂國王聖父天尊妙有二字承上三淸境來謂三淸境尚屬虛無至此始有象可憑而所有仍介虛無故曰妙有彌無所不到羅無所不包現示國王之身植根玉帝之質得道化之始具聖神之相湛然常淸寂然常靜玄遠神妙難以言形嗣位繼傳德莫與並誠聖父之慈悲父至尊之最上尊也此聖父至尊對玉帝而言下聖父天尊方稱妙樂國王至心皈命禮妙有真境彌羅內宮慈顏烜春日之和懿範凛秋霜之肅純全梵氣先天地以素存化現妙身厯后𡚱而示應具一氣胚胎之始寓帝身生化之殊萬化祖根衆生慈母大悲大願大聖大慈寶月光皇后聖母元君天地以素為質聖母純全真氣先天地而存其素也胚形氣初立也胎形氣稍全也具一氣胚胎之始者具坤元真氣胚胎帝身之始也寓帝身生化之殊者玉帝道身生化寓於聖母而顯其殊異也蓋玉帝分萬化統衆生皆由聖母誕生謂非萬化祖根衆生慈母乎至心皈命禮紫金金闕白玉玉京住妙有之境中處玄真之天上功成道備故妙相卓冠於諸天心廣體胖故慈光遍燭於三界位尊而上極無上道妙而玄之又玄真聖宗師天人依仗大悲大願大聖大慈穹蒼聖主玉皇大天尊紫金白玉謂玉帝京闕神光寶色與金玉無二非真金玉也普度功成至真道備故妙相莊嚴卓然冠乎諸天廣寬平也胖安舒也光燭三界事見後文上極無上位尊無比之稱玄之又玄道高難窮之謂穹蒼諸天總名此讚玉帝體統之尊至心皈命禮光嚴國內妙樂土中聖母凝神夢於虛無道君授玉質於恍惚慈愛和遜弗貪萬乘之尊榮忍辱仁柔不憚億劫之修纍功高無比德重難踰大悲大願大聖大慈現無量功德之身玉皇大天尊聖母感異夢而生玉帝本屬玄妙故云虛無道君以金嬰而𢌿聖母本屬杳冥故云恍惚慈愛和遜不貪君位之尊崇榮貴忍辱仁柔不憚億劫之修德纍功無量功德即蕩蕩無能名之謂宜乎果證玉帝也此讚功德之大至心皈命禮尊居帝位高處天宮遍遊於一切白玉京中普現於十方黃金闕內定而能應去來自在以無拘合而可分變化圓通而莫測演淸淨解脫之道濟沉迷憂苦之徒自然而然非識可識大悲大願大聖大慈現淸淨自然之身玉皇大天尊定不動也能應隨事順應也以心言即大學定靜安慮之意來去自在無有拘束以身言即中庸無入不自得之意合則為一分則為萬變化圓通莫可測度即孟子左右逢原之意演淸淨解脫之道濟沉迷憂苦之徒皆出自然不假勉强非尋常所可測識淸淨自然即不思不勉從容中道之謂此讚聖德之純至心皈命禮昔為王嗣苦建玄功三千餘劫之修行有如一日億萬生靈之拯度廣及十方雖法身由胎臟之胚腪諒聖體本道原之變化不壞不滅杳亡杳存大悲大願大聖大慈現神明堅固不壞真空無上法身玉皇大天尊昔為光嚴之嗣苦積無量之功三千餘劫之修行有如一日而不改億萬生靈之拯度廣及十方而無遺雖法身根諸聖母出於胎臟之胚腪而聖體從來未有實本道原之變化終不壞永不滅杳無而實有杳存而若無惟神明斯以存亡莫測大而化也惟堅固所由永無壞滅金剛身也非聖體之真空何能如是無上法身即無等無倫之謂此讚聖果之久長跪懴悔臣等自從無始劫無明煩惱覆真心常行殺盜與邪淫兩舌妄言並綺語誹謗大乘真正教鬬亂親朋離間人貪嗔癡暗縱三心喜怒愛惡增七慢厯劫罪根難記憶多生業垢莫能量皈依上聖大慈悲發露真心伸懴悔萬劫千生諸罪垢願從懴悔盡消除將此身心奉上真惟願罪根悉原宥無始劫無始以來之劫數也無明心昏昧也煩惱煩亂懊惱也覆如物之䝉覆也心有所覆故或行殺盜或行邪淫或兩舌而搬說是非或綺語而巧言亂聽或造言誹謗儒釋道大乘之正教或鬬亂親朋之情分或離間人家之骨肉或貪求無厭或嗔恨不休或癡迷不悟暗縱其三心或遂意而喜或拂心而怒或愛有所偏或惡有所僻連上三心共成七慢厯劫罪根難以記憶多生業垢莫能稱量今既皈依上聖發露改過之真心願所作罪垢從此消除將此現具身心永奉上真而原宥已往之罪根焉至心發願願眼常覩玉毫相願耳常聞說法聲願鼻常嗅衆妙香願舌常讚無上道願身不染邪淫禾嵗丿願意常存正信心發願上報四重恩發願下濟三塗苦廣運慈悲憐一切廣行方便度衆生仰惟玉帝大慈悲加護願心悉成就玉毫相玉毫光中之妙相說法聲真聖說法之妙音衆妙香衆聖身中自然之香無上道至極無可復加之道不染邪淫則心正矣常存正信則意誠矣四恩天地日月皇王父母也三塗色塗愛塗貪塗也苦心神形三重之苦也願廣運此本然之慈悲大行方便普度衆生倘非玉帝加意保護則此願何能成就乎至心朝禮太上無極大道三十六部尊經玄中大法宗師玄藴咒大哉元始無量度人演淸淨教登引天真玄座說法寂然無聲玉帝放光喜慶難言是為心傳亦曰天根大圓滿咒瑤章洞文集以成書敷落神真大哉元始天尊其度人之心殆不可限量也演淸淨之教登進接引乎天真玄座說法寂然無聲言天尊說法之妙聞者皆莫能讚一詞也當玉帝放光諸天喜慶之時天尊乘機應會演此妙經既為厯聖之心傳亦即造化之根柢大圓滿咒舉集中最要者而言瑶章洞文瓊瑶之章大洞之文也集以成書者集玉帝之功行暨諸真之請問以成一書也敷落神真者敷布落成登引神真垂至教於無窮也臣今東向誦願與天齊并存亡俱證果永度愛河津東為甲木萬類之生方也於時為春於卦為震皆發榮揚厲之候故誦宜東向也東向坐誦願化身如天之久遠而存者亡者悉成道果永出愛河之迷津則注想稱揚豈容已乎注想金容稱揚寶誥至心皈命禮太上彌羅無上天妙有玄真境渺渺紫金闕太微玉淸宮無極無上聖廓落發光明寂寂浩無宗玄範總十方湛寂真常道恢漠大神通玉皇大天尊玄穹高上帝太上太虛也彌羅無上天無極至上之天也玄真境玄象變化之真城也渺渺無際之意太微玉淸宮玉帝所居之宮太上玄微絶無塵染也無極以道言無上以位言廓落崇閎光明顯著又寂寂然不可測識浩浩然無有根柢也玄範總十方道範為十方之主也湛寂真常道湛淸寂靜真常不可移易之道也恢漠大神通恢恢無量漠漠無朕最大之神通也玉帝為萬天之尊故曰高每誥句貫聖號計十拜或諷全誥畢禮聖號九拜北向跪諷東向坐諷皆可開經讚太極分高厚輕淸上屬天人能修至道身乃作神仙行滿三千數時丁四萬年丹臺開寶笈金口永流傳大聖玉皇赦罪大天尊三稱三拜重刋道藏輯要箕集一高上玉皇本行集經卷上淸微天宮神通品第一爾時元始天尊在淸微天中玉京金闕七寶玄苑玉皇宮殿升光明座與無鞅數衆宣說靈寶淸淨真一不二法門爾時此經將演之時也淸微天中乃元始天尊所居之處而曰玉皇宮殿者玉皇之行宮寄在淸微天也白玉為京黃金為闕七寶為苑是時元始天尊居玉皇宮殿升大光明寶座與無量真衆宣說玄靈妙寶淸淨不染至真玄一無間無雜不二之法門七寶者碧土瑤階丹陛琉璃宮虬文壁白玉城金光色是也或謂金闕玉京惟玉帝有之似於淸微天無涉殊不知元始寶號原稱金闕上帝則金闕玉京原在淸微天內矣而玉帝誥內亦稱太微玉淸宮則夫玉淸聖境玉帝獨無行殿乎第玉淸境妙於虛彌羅天妙於有也下文夜光玉女節亦有三淸境界金闕玉京則可知統同而不得專屬矣只味一虛字有字便自豁然是時玉皇尊帝與諸天真飛天大聖無極神王靈童玉女九千萬人淸齊建節侍在側焉天真天仙真人也飛天大聖飛升於天之大聖也無極神王三千大千無窮極之神王也靈童玉女得少陽少陰之真氣者也九千萬人言其衆也凡此皆持淸齊建寶節相率而侍光明座之側焉侍側統玉帝在內蓋元始為造化之祖玉帝雖尊亦在弟子之列故侍側於是玉帝知時欲至即於會前舉六通力放大光明遍照諸天無極梵剎一切境界皆大震動十方無極一切世界俱同琉璃玻瓈無有隔礙玉帝知傳經之時已至即於元始會前彰舉視通聽通神觸通神會通夙神通豫照通六等之法力放至大之光明遍照諸天之玄梵宮剎一切神真之境界皆震驚聳動極十方一切仙佛之世界俱同琉璃玻瓈之光明瑩徹而無一毫之隔礙焉十方聖衆並乘五色瓊輪琅輿碧輦九色玄龍十絶羽蓋麟舞鳳唱嘯歌雍雍靈𡚱散花金童揚烟讚詠洞章浮空而來於斯時也十方聖衆並乘五色瓊玉之輪琅玕之輿蒼碧之輦駕九色玄化之神龍建十絶所無之羽蓋十絶謂上下八方之盡處麒麟鳳凰舞唱前導嘯聲和雅如歌音之婉轉隨侍之靈𡚱金童或散布奇花或揚拂爐烟讚詠大洞寶章同護仙駕浮空而來集帝京焉蓋為帝光之所被者如此此指衆仙言是時梵天一切金仙大乘菩薩四衆八部承斯光照皆乘金碧飛雲玉輿九霞流景慶霄四會三辰吐芳飛香八凑旋繞道前雨衆妙花如雲而下遍覆會前不但此也又見梵天一切大覺之金仙了悟大乘之菩薩天神魔鬼之四衆天龍之八部承帝光之照皆駕金碧飛雲之寶輿披九霞之彩服霞有九色流散妙景如綵服之絢爛也慶霄四會乘吉慶之良宵四方來會也霄與宵同三辰日月星也吐芳飛香蓋三辰得陰陽之真氣有自然之芳香也八凑八方衆聖一時環凑也雨落奇花如雲垂下此衆聖各顯神通也蓋為帝光之所被者又如此此指諸佛言是時帝光遍照諸天下燭十方無極世界同玄都境凡彼人間上近九天通接交連至親至邇凡彼下方無極世界山陵坡坂溝澗溪谷緬平如掌六合至邇三境非遼天寶臺殿星羅人間瓊瑤瑰玉朗耀雲衢七寶欄楯以界道路玉樹仙花蒨燦珠實景秀丹田芝草綿覆是時玉帝之光既上照乎諸天而無不遍自下燭乎世界而無不周上天下地晶瑩澄徹同於玄都之境玉帝所居人所難到故曰玄都人間地處至卑承斯光照與九天通明相接交互連合極其親近如地中高大之山陵崎嶇之坡坂汙下之溝澗溪谷一經帝光緬然平正如掌六合之大至邇也三淸之境非遙也諸天珍寶之臺殿如星辰之羅布於人間臺殿中瓊瑶瑰玉燦然朗耀於雲衢七寶之欄楯橫𥪡分界乎道路瓊枝之玉樹奇瑞之仙花莫不呈妙景吐異秀丹田中之靈芝瑶草如綿之遍覆而下界無不見焉此節極形帝光下照之妙遍照諸天句承上說下是過脉語不重時彼下方皆見諸天鈞天妙樂隨光旋轉自然振響又復皆見鸞嘯鳳唱飛鳴應節龍戲麟盤翔舞天端諸天寶花零亂散落遍滿道路是時凡聖駭異幽暗開光天人悅慶踴躍歡欣凡夫學士盡得飛升仰觀劫仭寶臺俯眄紫雲彌羅是諸世界一切人民咸臻道氣白首皺面皆得化度紺髮朱顔少壯幼稚轉增形容光澤美好苦惱痊平普䝉解脫安樂快然天下歌謡欣國太平上節言天人通接交連下方之人既見臺殿瓊瑰等類已又見諸天所奏之樂隨帝光旋轉自然聲振音響天上之樂不調自勻故曰鈞天祥鸞靈鳳飛鳴悉應乎節奏神龍瑞麟翶翔戲舞乎天端諸天所散之寶花絡繹繽紛充塞乎道路此時凡夫聖人無不駭異幽陰之所黑暗之處無不開光天上人間無不喜樂無知之凡夫學道之士人無不飛升仰焉觀劫仭高隆之臺八尺曰仭纍劫不壞故曰劫仭俯焉眄紫雲彌羅之境是諸世界一切人民不已同臻道域乎但見白首皺面之老得帝光化度變為紺髮朱顔少壯幼稚之人轉增形容而光澤美好衆苦諸惱痊泰安平盡皆解脫天下熙熙皥皥而享太平之福焉此節極形帝光度人之妙當邇之時神風遐著萬氣揚津天震地裂枯骨更生沈尸飛魄皆得復形酆都鐵圍長夜九幽即時破壞地獄苦魂化生諸天三惡道苦一時解脫時諸罪衆以斯光力得生十方諸大天宮當斯時也帝之神風遐邇皆著太和洋溢萬氣皆發揚津潤天震而風雨節寒暑時焉地裂而五穀成百貨出焉已枯之骨更得回生沉滯之尸飛散之魄皆復原形酆都大鐵圍山大鐵圍城冥冥長夜黑暗九幽即時破壞地獄受苦之魂化生諸天而在地獄餓鬼畜生三惡苦道中者莫不解脫是時受罪等衆仰仗帝光得生諸大天宮此一節極形帝光度鬼之妙爾時玉帝即分其身遍於十方諸大天宮令諸天宮自然化現白玉為京黃金為闕七寶玄苑大光明殿具光明座幢節幡蓋異寶奇花遍布是處爾時玉帝即以所分之身遍於是處白玉京中黃金闕內七寶玄苑大光明殿光明座上普為十方演說淸淨解脫之道人鬼胥度之後玉帝更分化法身遍及於諸大天宮令諸大天宮自然現出白玉京城黃金闕庭七寶玄苑大光明殿大光明座法幢旌節龍幡華蓋珍異之寶奇麗之花遍布是處且以所分之身遍在諸大天宮玉京金闕玄苑之中御大光明殿升大光明座普為十方罪衆演說真淸真淨悟解超脫之道時化玉帝各以無量天真大聖妙行真人靈𡚱玉女侍列左右是諸玉女顔容姝妙端麗奇特天珍異寶莊嚴身相言音淸徹衆所樂聞是諸玉女其身復出微妙解脫自然之香是香芬馥周遍諸天極妙樂土及諸大地一切福處妙行功行已臻神妙故稱真人姝妙姣好也奇特出衆也自然之香身所自具非尋常蘭麝也福處聚福之處也此節略言天真大聖而獨詳玉女者以天真大聖人所習聞玉女之神通則未之知也故詳言之且其身胡為而有香胡為而出微妙解脫自然之香是皆玉帝沉浸濃郁本大神通而醖釀於玉女之身玉女又能修諸妙行有以承受而發越之故其香於以周遍而廣覆也六道一切衆生聞是香者普䝉開度所謂天道人道魔道地獄道餓鬼道畜生道若諸天道一切天人或有能聞是此香者五衰四相永得消除轉增天福若諸人道王臣兆庶或有能聞是此香者即得人天長夀之樂身或滅度乃得脫殼尸解之道若諸魔道一切諸魔或有能聞是此香者安處天宮鬬戰之苦各得休息若諸地獄道一切罪魂或有能聞是此香者離地獄苦得淨土樂若諸餓鬼道一切餓鬼或有能聞是此香者即得飽滿無饑渴惱若諸畜生道一切畜生或有能聞是此香者脫畜生苦得智慧樂六道猶六路也天道有六等即佛典所謂界也一曰色界二曰欲界三曰無色界四曰無欲界五曰淸靜界六曰香馥界凡生前作善淺深沒後生天即視其淺深而各置一路香馥界乃最上之一路也天人非天仙真人乃止知修善不明大道故雖生天而未能免劫者天福享盡即入輪回五衰耳聾目瞶腰痠手卷腳軟四相羸瘦困憊鬚髮白面顔龍鍾天福增則無是患矣人天長夀之樂者在人為地行之仙在天為不壞之身也滅死也度超脫也蓋人之有身猶物之有殼聞玉女自然之香即得超脫猶物之脫殼而羽化也諸魔如修羅夜乂等類北陰山六洞天宮魔王所居之處常好戰鬬聞香則休兵息戰淸閒自在安處天宮也酆都鐵圍拘囚罪魂之所聞玉女身香即時破壞故得離地獄餓鬼之喉如針口常出火涓滴不下聞玉女身香則喉開食進腹內淸涼故得飽滿畜生之性最蠢聞玉女身香脫其毛皮復其靈明故得智慧香之所及拯救四生六道如此異哉其香乎大哉其香乎至哉其香乎爾時諸生天罪衆既得生是勝天宮已緣承慈光攝受之故便得覺悟各各明了罪福因緣與諸眷屬作天伎樂來詣帝前是諸衆等各各含悲俱發聲言臣等前後經千劫萬劫不見三光常處黑暗三惡道中多受苦惱伏䝉上帝方便放光愍救我等皆生天上是諸惡業悉皆滅盡無諸繫滯皆得往生仰朝上帝各到道前是諸生天一切罪衆說是語已稽首復位爾時諸罪衆得生無上天宮雖因聞香解脫實緣承受玉帝大慈光明接引之故方得覺悟各得通明了徹受罪之惡因獲福之善緣於是率其諸親眷屬奏天上技藝妙樂來至帝前感激流涕異口同聲俱曰臣等前前後後共經厯過千劫萬劫不見日月星三光常處九幽長夜墮於獄鬼畜三惡道中受諸苦惱自分無有出期伏䝉上帝普行方便大放光明救拔我等得生天上凡諸宿業往愆全歸消滅朝拜光明寶座瞻仰元始天尊道會之前真是萬劫難逢之事說是語畢各各再拜稽首而復其侍立之位焉此一節結上文玉帝放光度脫之意以起下文妙音之端爾時玉帝出大妙音普告十方諸天聖衆汝等諦聽此諸罪衆曠劫以來縱無明性造十惡業六塵遍染三業縈纏肆意任心曾無覺悟陰罪陽過日積月深背道違真順邪棄正舉心運念動結愆尤遂使命過之後身落三塗不得解脫若非今日遇是法會何由出離爾時各處化身玉帝同時俱發淸妙之音普告十方諸天聖衆曰汝等敬聽朕言此等罪衆乃自厯劫以來縱昏昧不明之性造殺生偷盜邪淫兩舌惡口綺語妄言及貪欲嗔憾癡迷之十惡縱無明性故口耳鼻舌身意之六塵遍染而不能滌除造十惡業故身口心之三業縈纏而不能解脫肆放其意任縱其心曾無覺悟之期人所不見之陰罪人所共聞之陽過日日而積月月而深背畔大道違逆真教順從邪途棄舍正路存心動念種種俱結愆尤以致身死之後或落地獄或落餓鬼或落畜生沉淪三惡道中永無出脫之期殊堪憫惻若非今日遇此法會妙筵何由出離苦業哉爾時諸天化身玉帝即以神通不動其所移接天人皆令得至淸微天宮玉淸聖境元始會下是諸衆等不覺不知是時天尊及會衆等見是十方玉帝化身普皆來集天尊會前如無邊明鏡照諸影像互相容入時諸大衆稽首瞻仰玉帝化身聖中最尊增長淸信益加志樂心無退轉起大堅固當妙音開度之後諸天化身玉帝各具最大神通巍然不動似未見其離卻方所而凡屬慈光接引之天人皆隨駕而齊集道會之前此諸天人有知而若無知也有覺而若無覺也渾渾穆穆焉而已是時天尊及會衆等見帝身如無邊之明鏡光亮瑩徹將各天宮所分化之法身形像互相含容納入以萬歸千以千納百以百併十以十合一大衆等不覺稽首瞻仰極口稱讚增長其淸淨誠信之心益加志樂而向道不回消除其退諉轉避之思起大堅固而拳拳服膺焉自首節至此總讚玉帝神通之大所以後列十七光首則曰大神通者蓋神通已不可測更加以大則巍巍蕩蕩非言思擬議之所能及矣故光末以無能勝殿之大矣至矣時諸天人邇得生天忽覩天尊勝會道場淸淨第一無為功德之所莊嚴踴躍歡喜一時作禮歎未曾有爾時十方諸化玉帝俱復一體坐法座中法筵淸衆俱願欲聞玉帝本行修證未敢議問時諸天人獲承玉帝慈光得至淸微天上忽覩元始天尊勝會道場至淸至淨妙極無加然雖幽深玄遠渾穆無為而功德之所卻又自然莊嚴不覺五體投地歎為希有諸化身玉帝見天人踴躍歡喜如此亦收攝神通復為一體坐光明法座之中或去或來倐分倐合玄妙莫測法筵大衆俱欲願聞玉帝本行修證之由而未敢擬議請問焉此一節為元始天尊宣說玉帝化身之張本故將勝會道場帶讚數句於是天尊普告四衆言往昔有國名號光嚴妙樂其國王者名曰淨德時王有后名寶月光其王無嗣嘗因一日作是思維我今將老而無太子身或崩殁社稷宗廟委付何人作是念已即便敕下詔諸道衆於諸宮殿依諸科教懸諸幡蓋淸淨嚴潔廣陳供養六時行道遍禱真聖已經半載不退初心妙樂國在西海外慧靈山作是思維想念是事思慮圖維也王無太子慮社稷宗廟無人承受作此念已竟傳下敕旨詔諸道門淸衆於各宮殿之中依諸科儀教典懸諸彩幡寶蓋齊明以淸淨其內盛服以嚴潔其外廣陳品物以作供養於白日六時中行香演道禱祝真聖半載不退初心其尊崇大道䖍誠永久可知忽從一夜寶月光皇后夢太上道君與諸至真金姿玉質淸淨之儔駕五色龍輿擁耀景旌蔭明霞蓋是時太上道君安坐龍輿抱一金嬰身諸毫孔放百億光照諸宮殿作百寶色幢節前導浮空而來是時皇后心生歡喜恭敬禮接長跪道前曰道君言今王無嗣願乞此子為社稷主伏願慈悲哀憫聽許爾時道君答皇后言願特賜汝是時皇后禮謝道君而乃收之皇后收已便從夢歸覺而有娠懷胎一年於丙午歲正月九日午時誕於王宮忽從一夜寶月光皇后夢太上道君與諸至聖真人皆金姿玉質淸淨不染之輩乘五色之龍車擁簇光耀妙景之旌節蔭罩明輝霞光之寶蓋安坐龍車之中抱一金嬰其嬰身諸毫孔內放出無數祥光照映王之宮殿皆成百寶華彩之色法幢旌節在前引導凌空而來是時皇后恭敬禮拜求此嬰為王之太子道君遂准其請答言願特賜汝皇后覺而有娠懷胎一年得四時之全氣丙午正月九日午時皆陽數也玉帝初生之異如此當生之時身寶光焰充滿王國色相妙好觀者無厭幼而敏慧長而慈仁於其國中所有庫藏一切財寶盡將散施窮乏困苦矜寡孤獨無所依怙饑饉癃殘一切衆生仁愛和遜歌謡有道化及遐方天下仰從歸仁太子父王加慶玉帝降生之時身放百寶光焰充滿於光嚴國內色相奇妙美好觀者永無厭心幼則聰敏智慧長則慈悲仁愛將國中所有庫藏財寶盡散施一切無告之衆生深仁至愛出於自然溫和謙遜並非勉强一切衆生被其澤感其恩咸謳歌頌謡稱為有道仁人當是時也恩周境外生及遠方天下景仰率從莫不歸仁於太子光嚴國王生帝之時固己歡悅至此心中益加慶幸焉當爾之後王忽告崩太子治政俯念浮生告敕大臣嗣位有道遂舍其國於普明香嚴山中修道功成超度俯念浮生下視已身而思念也人生在世如天上浮雲水上浮萍難以常在故曰浮生帝既念此因告敕大臣將位傳於有道之人遂棄舍其國入普明香嚴山中修習大道行滿功成超凡出世度生天上普明香嚴山在西海外蟠桃山左帝超劫後改名金詔山過是劫已厯八百劫常舍其國為羣生故割愛學道於此後又經八百劫行藥治病拯救衆生令其安樂此劫盡已又經八百劫廣行方便啓諸道藏演說靈章恢宏正化敷揚神功助國救人自幽及顯過此已後再厯八百劫亡身殞命行忍辱故舍已血肉如是修行三千二百劫始證金仙號曰淸淨自然覺王如來教諸菩薩頓悟大乘正宗漸入虛無妙道如是修行又經億劫始證玉帝說是語已法筵淸衆異口同聲歎未曾有劫有大小六十年為微塵劫五百年為羡數劫三千年為閏置劫一萬八千年為小劫十二萬九千六百年為轉輪劫劫劫相延積至萬數乃為大劫八百劫不必拘大小玉帝功成超度之後厯八百劫屢為國王常舍其國為超度羣生之故割斷六親恩愛學修大道又經八百劫施藥療病令衆生安樂又經八百劫多行方便之事啓諸道典演說玄靈寶章恢宏正大之化敷揚神聖之功輔助國家救濟人民自幽冥以及陽世無不被澤又經八百劫亡歿其身不敢愛惜捐殞其命不暇瞻顧惟含忍恥辱不惜一已之血肉濟物利人如是修行已經三千二百劫万得位證金仙成不壞之正果號曰淸淨自然覺王如來教導諸菩薩了悟大乘正法真宗漸次入於玄虛真無至妙大道如是修行又經十萬劫方證玉帝之位元始天尊說是語畢法筵淸衆俱異口同聲稱歎自來未曾見此妙行也爾時衆中有一玉女名曰夜光從座而起嚴整衣冠從容雅步長跪道前白天尊言臣宿昔何幸仰侍御前親奉供養已經億劫三淸境界金闕玉京寂淡逍遙快樂自在嬉遊聖域餐聽法音未曾見此希有之事雅步緩步也臣夜光自稱也言夙命昔劫幸得瞻仰侍列於玉帝御前親自承奉供養已厯劫十萬之久凡玉淸上淸太淸三等境界與夫黃金闕白玉京寂然淸淡無事逍遙至快至樂得大自在嬉遊聖真之境餐聽法會之音皆目所親見曾未覩玉帝分身變化之妙如今日者此一節乃夜光欲得玉帝化身之由不審向來光內所現十方諸天變現聖境皆有玉帝應化法身天真大聖妙行真人靈𡚱玉女以為侍衛是諸玉女相貌端嚴形體姝妙出衆妙香無與等者復䝉玉帝神通移接今皆普集在淸微天未審今此玉女以何因緣得證如是無上色身恩惟聖慈示以未悟夜光又言未知向來大光明內所現十方諸天變化現顯之聖境皆有玉帝法身又有天真等衆以為侍衛其隨侍之玉女不但相貌形體逈出尋常而身出異香芬芳馥郁普度六道世間一切之香無與等者今䝉玉帝接引齊集在淸微天中未審此諸玉女有何因何緣得成如是最上之色身乎伏望慈悲示以未悟之義焉此一節乃夜光欲得諸玉女身香度脫之由爾時天尊謂夜光玉女言汝固初入聖流雖有智慧未能明了此諸玉女乃自往昔無量劫中修諸妙行具解脫門同淸淨信同淸淨解同淸淨念同淸淨行同淸淨身同淸淨心同淸淨意同淸淨果同淸淨報同大慈心同大悲心覆護衆生如母撫念愛於赤子奉戒專一冥心大道淸齊宏誓千萬劫中尊奉玉帝天尊言曰爾夜光初入聖流雖具聰明聞見未廣是以未能明白了悟今此諸玉女乃自往昔無量劫數之中苦修功行已得大解脫法門其用功獲效之處節節與玉帝相同而纍劫不染焉如勿二勿三玉帝夙修常淸淨信矣此諸玉女亦同此淸淨信焉見理不惑玉帝夙修常淸淨解矣此諸玉女亦同此淸淨解焉萬緣胥盡玉帝夙修常淸淨念矣此諸玉女亦同此淸淨念焉淸齊學道玉帝夙修常淸淨行矣此諸玉女亦同此淸淨行焉不染邪穢玉帝夙修常淸淨身矣此諸玉女亦同此淸淨身焉心即道道即心玉帝夙修常淸淨心矣此諸玉女亦同此淸淨心焉無將迎無期必玉帝夙修常淸淨意矣此諸玉女亦同此淸淨意焉位冠諸天玉帝得淸淨果矣此諸玉女亦同此淸淨果焉尊為上聖玉帝得淸淨報矣此諸玉女亦同此淸淨報焉仁育億彚玉帝具大慈心矣此諸玉女亦同此大慈心焉恩孚沙界玉帝具大悲心矣此諸玉女亦同此大悲心焉玉女慈悲之心豈沾沾以為恩哉就如慈母之於赤子一般且其奉持玄戒精專誠一冥心於大道而不搖於外物淸淨齊䖍具洪大之誓願而不流於狹小千劫萬劫之中皆尊奉玉帝以故身出異香超凡度世夫豈淺見所能窺測者哉此諸玉女非實是女皆天至真為度羣生現玉女身是故身色神通智慧隱顯變化與帝同焉爾時夜光聞是說巳心得開悟稽首歡喜默然復位且此諸玉女爾謂具全陰之質為真女子哉乃天真至人憫衆生愚昧以剛道化之則不信以柔道化之則易從故幻出玉女之身覺迷度世所以其身其色其神通其智慧或隱或現種種變化皆與帝同其妙焉既與帝同其妙又何疑於身香之故哉爾時夜光心開意解稽首而復其侍立之位焉爾時高虛淸明天主與諸天眷屬馭八景鸞輿蔭九光寶蓋奏玄歌妙樂詠無量洞章散天寶花噴天真香飛步遊空來詣道前承天尊玉帝威神之力是諸寶花即於空中化一寶蓋蔭覆大衆無不周遍當夜光復位之後又有高虛淸明天主率其本天諸眷屬各駕八寶妙景之鸞輿蔭九霞光耀之寶蓋奏太玄雅歌之妙樂詠無量三洞之寶章遍散天花異香芬馥飛步凌虛遊空而來敬至道會之前但見天尊與玉帝神通威力至奇至妙將所散諸花結一寶蓋蔭覆法筵諸衆而無不周遍焉是時高虛淸明天主見此希有稽首長跪白天尊玉帝言賤臣懈怠後會法筵今日吉慶值遇法橋幽顯聖凡普霑聖澤放大光明現希有相上照諸天四梵六欲一切樂土諸真聖衆覩此光明悉皆雲集下照下方無極世界同玄都境近接九天靈風奏樂宮商相和激朗雲庭皆成洞章一切衆生咸臻道化酆都鐵圍長夜九幽一切地獄受苦衆生盡承光力皆生諸天得受快樂今日所散天寶奇花旋結成蓋遍覆法筵大會諸衆盡承斯光威神之力臣等千劫良因九天運會皇道蕩蕩正法興隆今日大吉咸仰玄功結蓋覆衆洵為希有之事此時高虛淸明天主不覺驚喜踴躍長跪言曰賤臣懈怠後會法筵今日良辰幸值玉帝普駕法橋濟迷度溺幽顯聖凡皆得仰沾聖澤伏見玉帝所放大光明上照乎諸天天有三十六等謂之諸天凡四梵六欲等處一切至快至樂之真聖天人無不咸集焉梵天有四種謂之梵妙上天一切真聖居之欲天有六種即前天道之六界也初入道者居之六欲云者言其尚未脫乎口耳鼻舌身意之六欲也下照乎諸地凡一切世界俱淸淨同於玄都澄徹接乎九天且光中之靈風觸物成聲如奏太和雅樂宮商相和激揚朗震於雲庭所奏之聲皆成三洞寶章之音俾一切民人無不咸臻道域焉幽照乎地獄凡酆都鐵圍長夜九幽一切受苦罪衆無不解脫而往生焉今日臣等所散諸花荷䝉威神之力結蓋蔭衆誠千劫良因九天嘉會將見皇天至道從茲蕩蕩妙應玄功自此興隆矣是時高虛淸明天主以偈讚玉帝曰金闕玄穹主高上玉皇尊妙相冠諸天慈光燭三界真聖妙道師天人依仗師大乘垂法語真一指迷途功德若虛空讚揚無窮盡玉帝玄功聖衆羣仰而未能明言其妙於是高虛淸明天主再拜稽首而作偈曰大矣哉金闕玄穹之主至矣哉高上玉皇之尊言乎妙相則冠乎諸天而莫及言乎慈光則燭乎三界而靡遺誠羣真萬聖之章程天上人間之教主垂大乘之法語至真至一為羣生指點迷途俾六道同歸解脫此種功德無量無邊譬若虛空無有止極豈讚揚之所能盡乎是穹蒼主浩劫之尊妙見妙知無等無倫湛寂真淨杳亡杳存上聖上靈大神通光明藏大丈夫開化人天教導無窮大慈大悲流煥法輪為度羣生是號玉皇穹蒼真老妙圓淸淨智慧辨才至道至尊開度衆生故放是光爾時高虛淸明天主說偈讚巳靜默而坐功德讚揚難窮信乎玉帝為穹蒼之聖主浩劫之至尊其見之所臻知之所及無有與之同等而相倫類者外誘不蔽而湛然內念不興而寂然不二不雜其道至真無染無淪其德至淨杳亡杳存不可測度上聖上靈莫與嫓美分身成化大神通也普照一切光明藏也成巳成物大丈夫也開化人天教導無窮大慈大悲之心也闡明玄奧俾法輪流轉而煥明以超拔乎六道之衆生是以號稱玉皇為穹蒼之真老神妙圓通真淸真淨大智大慧大辨大才吁道至此弗可尚巳尊至此蔑以加巳此節乃淸明天主因上偈讚未足以盡玉帝之妙故又推廣而咏歎之於是天尊復告四衆云是帝身即道身也非常體也是無量功德之身是淸淨自然之身是神明堅固不壞真空無上法身威靈恢廓名聲周遍無幽不燭神妙巍巍不可得而名焉淸明天主偈讚玉帝巳復位默坐於是元始天尊復告法會四衆曰爾等見玉帝分之成萬合之為一是妙化之身不知即大道之身非尋常形體也是無量無盡大功德之身是真淸真淨自然不拘之身是神化靈明堅確貞固如太空之厯劫不毁最上無比之法身其威德靈光恢然至宏廓然至大故聲名洋溢乎十方而無一之或遺慈光遍照乎三界而無幽之不燭神通圓妙巍巍乎不可得而名焉連指點數身字見非虛無杳冥惟實有是身乃能大顯神通罔有窮極更找足應前誥中數身字是帝非有為功德之所熏修而帝昔雖下生人間多劫行化示大神通而身淸淨未嘗不在金闕分身變化應現隨方利濟羣生超升道岸普垂教法開悟後人依教奉行登真成道以斯功德之所莊嚴是故光明常遍諸天神智妙達莫可度量巍巍無得而名則是玉帝功德豈勉然有所作為如物之熏染修治而成哉蓋帝之往昔雖常降生人間厯劫廣行教化顯示至大之神通而法身淸淨未嘗不在金闕之內其分身變化或應或現各隨方所俾六道羣生莫不䝉其利濟超升道岸其玉音開度普垂教導使後之人有所遵循有所率由莫不位證上真成全大道帝之功德如是故法身莊嚴雖寂然止其所而不動而有諸內者自形諸外是以身之光明常遍滿於十方諸大天宮大神大智靈妙通達不可測度而計量焉是身光明皆具妙號所謂大神通光大慈悲光大喜舍光大忍辱光大平等光大柔和光大自在光大利益光大如意光大智慧光大吉祥光大解脫光大歸依光大功德光大圓滿光大無礙光無能勝光喜舍忍辱如施財濟人橫逆不報之類平等物我無間也柔和柔順和藹也自在無入而不自得也利益者普度羣生之謂如意者從心所欲之謂善神擁護惡曜不侵故曰吉祥至心向道永無退轉故曰歸依功成道備謂之圓滿變化莫測謂之無礙凡此皆至極而無能勝者也通節以神通光為綱領以下十五光皆其中之分見者故以無能勝光結之是故汝等欲見是帝而不可得者緣以汝等尚於身口不捨結習煩惱行業由是障故不能得覩是帝慈顔吾今為汝法會衆等宣示斷障之法汝等大衆宜各奉行時諸大衆不勝喜躍各於至尊几前稽首作禮俱欲願聞汝等指天神魔鬼四衆言天即生天之人神乃享受血食者魔即天之修羅鬼乃未脫冥趣者此四種皆未能斷障於是天尊復告之曰十七光明遍照諸天宜乎玉帝法身爾等皆得見之矣乃猶有欲見而不可得者其故何哉蓋緣爾等之身與口或為氣禀所拘固結而不解或為物欲所纍習焉而不察或惹煩惱或積愆行或植業緣種種障蔽本體之明有時而昏由是之故不得仰覩慈顔我今大發慈悲為爾法會衆等宣示斷除障蔽之法爾等宜各祗奉遵行焉天尊言曰斷障之法當生大慧毋起疑惑毋起貪嗔毋起淫欲毋起嫉妬毋起殺害毋起凡情毋起凡思毋起昏垢毋起聲色毋起是非毋起憎愛毋起分別毋起高慢毋起執著法筵淸衆俱願欲聞斷障之法於是天尊言曰斷除障蔽其道無他惟生大慧之心而已蓋大慧本心之自具一有所蔽則慧者漸至於不慧必也勿二勿三毋起疑惑不忮不求毋起貪嗔保精育元毋起淫欲克寬克仁毋起嫉妬愛惜生命毋起殺害萬緣俱淨毋起凡情萬念悉捐毋起凡思心貴於明毋起昏垢心貴於正毋起聲色心貴於淸毋起是非心貴於公毋起憎愛心貴於平毋起分別毋高已而慢人則物我之見去毋執著而不化則適莫之念消如此則大慧庶幾可生矣毋者禁止之辭蓋是十四者皆身口之纍勇往而决去之則本體之明復全於我欲淨理純呼吸之頃可通帝座又何患玉帝法身之不可見哉凝神澄慮萬神調伏心若太虛內外貞白無所不容無所不納無令外邪亂其至道牽失真宗敗其靈根盜其至寶致爾萬劫永墮凡流透入俗網萬魔來攻百千萬劫不聞妙法鬼神執誅從生入死是故汝等應當至心善護真宗無令喪失如前所說如是諸障汝等各各當除斷之身得淸淨超度諸難是名修道寶筏持法棟梁諸障既除則吾之神由是凝而不散吾之慮由是澄而不雜萬神即萬念也由是調和濳伏不相動擾此心空空洞洞若太虛之內外淸貞潔白俾羣生萬有無不含容無不包納功夫至此漸進純熟然猶時時防間刻刻省察無令外面邪回亂我至正大道牽引喪失我之真正玄宗敗我之至妙靈根盜我之元陽至寶致使沉淪纍劫永作凡庸之流墮入俗網之內萬種陰魔相率來攻百千萬劫不聞妙道鬼神乘機得以執法誅戮從生途而入於死路可勝歎哉是故汝等法會四衆當發至誠心善自護持本來真宗無令喪失如吾前所說十四障最為人所易犯爾等各各當除斷之自然身得真淸真淨度脫諸般厄難可見斷障之法乃修道之寶筏持法之棟梁也爾等敬聽之哉真宗即性中之仁義禮智也靈根神氣也至寶精髓也敗與盜不必專指女色凡一切聲色貨利皆是更當修奉是此經典如近是帝生尊重心注想尊容稱揚尊號然後汝等得覩慈顔咸䝉護度普聞妙法親奉供養永無輪轉是時四衆聞是說已歡喜踴躍歎未曾有斷障之法爾等既獲聞矣更當於玉帝之經文典章修持崇奉如對玉帝一般刻刻尊重無敢褻越尊重云何心則注想尊容口則稱揚聖號厯久不懈然後得見慈顔咸䝉護持拔度普聞無上妙法親自承奉供養庶幾哉永脫塵網不受輪回轉生之苦矣是時法會四衆聞天尊之說巳俱歡喜踴躍歎是帝是經為厯劫以來所未嘗有也世之獲遇斯經者宜何如尊奉也乎高上玉皇本行集經卷上全收讚穹蒼聖主具大神通分身說法遍天宮妙道覺羣䝉功德虛空賡頌莫能窮大聖玉皇滿大天尊三稱三拜
