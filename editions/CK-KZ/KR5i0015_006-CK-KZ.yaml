front:
  text: 高上玉皇本行集經重刋道藏輯要箕集三高上玉皇本行集經卷下
  hash: sha256:84d7206c6f061d04f0518dfd6e950bd11a7c1647f3abccbcae80c4c3006cddfc
  markers:
  - {type: page-break, offset: 8, content: '', id: CK-KZ_KR5i0015_06p001a}
body:
  text: 天眞護持品第四爾時昊天大帝聞說經法從座而起長跪帝前白言惟願聖慈普爲大眾及諸天人持是經人說利益事於是玉皇上帝興方便意開利益門宣玉匱科傳靈寶法吿於昊天大帝曰汝等諦聽當爲汝說受持功德扶危拔苦利益存亡神妙之事眾眞稽首俱發聲言臣等今日幸聞湛然常住之法莫不上福諸天徧周三界三塗五苦咸得消滅惟願慈悲憫臣等故演斯妙義諸天人者一切天下人間之人也興方便意二句言玉帝興起方便之意爲昊天大帝開陳利益之門玉匱科玉匱中之科條也靈寶法玄靈妙寶之法也湛然淸淨不染之意常住念無生滅也三塗色塗愛塗貪塗也五苦心神形精魂是也前功德品亦元始天尊承上二品而極言天經功德之大雖說重持經之人而實緣經之大寶有以普利一切是經何經乃玉皇之尊經也故昊天大帝聞天尊說後而轉請於玉帝懇帝言利益是猶歸重王人之意玉帝大慈大悲有不因請而暢言利益者乎觀下文諸條可見玉帝吿曰若有眾生孝養父母恭敬三寶竭忠於君不殺不盜不淫不妒不嗔不恨不驕不詐奉戒持齋冥心大道生尊重心持誦是經我卽勅下周流法界徧傳十方無極世界勅命東方東華帝君青騎神仙兵馬無鞅數眾悉令下降覆護受持是此經者勅命東南扶桑大帝與其部眾神仙兵馬無鞅數眾悉令下降覆護受持是此經者勅命南方朱陵大帝赤騎神仙兵馬無鞅數眾悉令下降覆護受持是此經者勅命西南太華元老與其部眾神仙兵馬無鞅數眾悉令下降覆護受持是此經者勅命西方皓靈皇老白騎神仙兵馬無鞅數眾悉令下降覆護受持是此經者勅命西北皇天大帝與其部眾神仙兵馬無鞅數眾悉令下降覆護受持是此經者勅命北方紫微帝君黒騎神仙兵馬無鞅數眾悉令下降覆護受持是此經者勅令東北沖虛天君與其部眾神仙兵馬無鞅數眾悉令下降覆護受持是此經者勅命上方天皇大帝崑崙蒼老黃騎神仙兵馬無鞅數眾悉令下降覆護受持是此經者勅命下方來和天君名山大洞神仙兵馬無鞅數眾悉命下降覆護受持是此經者奉戒持齋奉玄戒持齋素也冥心向道不囘之意周流法界三句乃下諸節總綱言十方聖眾皆奉帝勅各率其所屬覆庇護佑持經之人則持經功德不亦大乎此一節指十方一切神之尊者而言東華帝君卽王公非嶽帝也扶桑大帝位東南東南巽方介木火之交所謂已火是也故有丹陵之號若正南午向則朱陵矣原是兩帝總皆火府之尊十方大帝東主生發之柄南主長養之柄西主厲肅之柄北主斂藏之柄是爲四正其東南西南西北東北是爲四隅則各主生發長養厲肅歛藏之事在東者太乙宮隸之在南者離明宮隸之在西者太華宮隸之在北者玄㝠宮隸之而東南則居淸甯宮西南則居靑靈宮東北則居廣漠宮西北則居廣利宮上方則主上界之事下方則主下界之事宮無定所勅命十方一切金仙四眾八部及諸眷屬悉令下降覆護受持是此經者勅命十方天眞大聖飛天神王三官四聖二曜九星北斗南斗東斗西斗中斗二十八宿周天眾星金剛力士神王等眾各與部眾悉令下降覆護受持是此經者金仙諸佛菩薩也三官天官地官水官也四聖天蓬天猷翊聖佑聖也二曜日月也九星金木水火土及月孛紫炁羅㬋計都也五斗及二十八宿皆周天之眾星金剛力士神王乃釋道二教之護法此一節指上界一切眾聖而言勅命降魔力士四天門王五嶽四瀆及諸名山四海九江十二河源山林川澤一切主者悉與眷屬覆護受持是此經者諸險惡處令得安穩勅命所在一切土地靈官並溝渠等神及一切諸大力鬼王皆令覆護受持是此經者令諸魔外道悉皆攝伏潜形遁跡高飛海外遠避他方降魔力士降伏諸魔有力之士也四天門王管理天上四門之王也五嶽東㤗山西華山南衡山北恒山中嵩山也四瀆江河淮濟也十二河源卽大禹所疏之九河及汝漢淮泗是也無水曰溝有水曰渠大力鬼王鎭守幽㝠之將帥諸魔如天魔地魔魔鬼魔女等類外道挾持異說以惑人者也攝伏恐懼收斂之貌此一節指上下一切神之卑者而言如是山林社稷祠廟血食之屬一切鬼神當自消滅五方行病瘟疫鬼帥諸惡鬼神並風王水怪孽龍妖神土精木魅盡自消滅五虛六耗夢寐乖常野道咒詛蠱毒之類皆自消滅是持經人心欲願者一切如意皆得滿足如是持經之人非特邪魔外道畏避已也凡屬山林社稷祠廟血食一切鬼神皆安然無事消滅其偏好偏惡之心而不敢擅作威福五方行瘟之鬼帥諸作惡之鬼神行風之王水中之怪造孽之龍爲妖之神穴居之土精山居之木魅天哭破敗喪門弔客等之五虛六耗以及夢寐之乖常邪教之詛咒蠱毒一切等類盡皆消滅且百福臻而千祥集心所願者一切圓滿充足而無不如意焉或有未能遵依科教修崇齋醮但能淸淨持戒專一信受尊重敬慕是此經典並同修齋護持淨戒者是人功德坦然無礙自在逍遙號人中聖德慧長新同諸眞人玉經之效如此能依科建醮受持讀誦功德固云無量或有未能遵依玄科教典設大齋醮但能淸淨無染持戒無二專一信受而不敢忽尊重敬慕而不敢䙝將見諸神敬仰護持淨戒之人無異於護持修齋之人可見淨戒持經卽不必修齋而其功德坦大寬平毫無繫滯阻礙逍遙自在名爲人中之聖至德大慧畢世長新同於諸天眞人焉爾時昊天大帝聞是說已卽於帝前稽首歌曰大哉至道無形無名𣺌𣺌億劫黃道開淸神風朗耀九炁吐精玉虛澄輝太霞高明玉皇開化溥度天人三元道備二象攝生朽樹故根己枯使榮蠢動蜎息長生化形懷胎含孕俱得生成亡者命故魂歸三淸魄受鍊度南宮飛昇今日大吉皆得光明五帝鑒照普吿萬靈天神地祗及諸河源五嶽四瀆及諸名山洞玄洞淵洞空洞仙無極大聖至眞尊神無窮無極溥鑒度生惡根斷絕玄都記名眾眞班列咸聽帝言經是帝勅保誦持人至度道岸無使灾侵我奉帝命一切咸聽大哉至道無形無名而不可聞見𣺌𣺌億劫而無窮修累當此黃道吉辰天道開淸神風朗耀之時九炁九天之梵炁也吐精而異彩顯露玉虛玉淸之虛無也澄輝而神光昭著太玄霞光高明而不可幾及玉帝乘此時逢此運而普度一切天人也三元二句言玉帝尊經備乎三才之道而包乎二象之精統攝生人生物之理也朽樹十句極言經功之大今日指說經之時而言皆得光明言人物咸濟幽暗開光也五帝至度生句指當時會上一切監臨之眞聖也末數句反覆詠歎之意於是昊天大帝說是歌已告大眾言此玉皇妙法語諸聖祕密言路絕道斷微妙難思巍巍大範爲神明之宗保鎭國土拔度生死爾時昊天大帝說是語已法筵淸眾咸仰道言普得開悟秘密寶重而不敢輕洩之意路絕道斷盡境也言此經乃成眞修仙之盡境大範範圍一切之意於是天尊重宣此意而說偈曰玉帝功德大玄理極幽深生於浩劫前運化於古今我今說妙經憫念諸有情此誠極妙法功德中功德名號最上乘無比爲第一大光明王尊威德世希有能破暴惡魔皆令心降伏能滅極重罪皆令得淸淨若人聞是經或聞帝妙號稽首生恭敬一切罪消滅十惡四重罪五逆於父母信心一稱名隨聲盡消滅保護人天眾四相與五衰三塗極重苦人間凡厄難凶年饑饉喪毒藥及魘魅刑獄與𡨚家軍陣鬬戰苦山林惡道中虎豹豺狼眾江海毒龍類迅雷風雨雹水火及盜賊蠱毒中心腹失志發狂亂蛇蠍毒惡蟲邪魔凶怪神伺求人便者由持是眞經普皆自㪚滅惡病久纏綿夢寐亦不安非理欲殘命殄滅不爲殃緣遇是經故安穩得自在所有希求願財寶及富貴以此經功德如意皆稱遂神威自在仙諸天十一曜三十二天主二十八宿星靈𡚱玉女等天神及地祇三界虛空神江海諸龍王水火及風神宮殿與宅舍山林樹木眾溝渠井泉神由持是經故一切皆擁護衣食常自然子孫臻富貴出言人希聞所至皆推敬若爲求男女持誦此眞經帝詔下天曹落籍天仙人降謫生其家爲其作男女顯貴人崇重七祖得超昇光大慶門戸延及父母親吉祥常熾盛灾障不能侵是故我今說大眾宜諦聽慈悲度一切皆令達上淸偈中所載皆功德品中所己見者也玉帝旣准昊帝之請廣陳利益天尊聞之愈加慶慰故重宣此偈非複詞也蓋初學之人下品之士善根未固不言功德之大則其向善之心不堅故不憚反覆叮嚀天尊示人之心至深切矣於是天尊普告四眾凡人持念此經受誦帝號皆道根深重宿有善緣此經尊妙普度天人但精心恭奉家國安甯保命度灾掃除不祥天子王侯得奉之者致國太平凶冦自夷邊域不爭兆民歌唱普天興隆運推數周正道當行有得之者天眞敬重寶之秘之此承上文未盡之意而極言之運推數周二句卽三龍之後庚子之年眞道乃行之意蓋玉經旣演諸天人無不遵受而奉行之則雜法邪說之人皆廢然自返而不敢逞其無所忌憚之詞如天久陰晦一旦豁然開明浮翳消㪚所謂經正則庶民興斯無邪慝矣報應神驗品第五爾時慈悲度厄眞人尋聲救苦眞人濟生度死眞人萬福䕶身眞人俱從座起越班而出俱白天尊言若諸末世凡夫雖宿有善緣得遇是經被諸邪障所隔本末疑惑不信是經功德如是之人見在未來於諸地獄得何罪報惟願聖慈說其報應惡趣之苦夙有善緣得遇是經復爲邪障所隔反致疑惑不信故獲罪甚大隔閉礙也本末猶言始終見在未來指今生後世而言也玉經尊重而有受持之人卽有疑謗之人受持者旣積功德大利益則疑謗者自應受種種報應前二品欲歆動學道之心此一品乃垂戒凡流之意不有諸眞請問無由以暢其旨故天尊因問動念反覆叮嚀吿誡可謂切矣是時天尊吿四眞人云若諸世間剛强暴惡不善眾生終日竟夜對諸道像無恭敬心出誹謗語是罪當墮五無間獄若遇是持經人設諸方便誘引開導如是之人能滅惡心信向是經彼人罪業淨盡無餘剛强暴惡性狼行兇之貌道像道教諸神聖之像誹議之也謗毁之也冥中五獄刀山劍樹犁泥鼎鑊寒冰也無間無盡之意設諸方便者設出諸般方便之法或善言以誘引之或婉詞以開導之也引証市民王偁禀性頑劣誹謗大道一日忽雙目失明有道士登門化齋教以持誦玉皇經偁辭日愚人瞽廢不能從命道士日但請人書寫亦可偁從之造完一部延師口授䖍誦不輟忽夢前道士來持刀抉其目偁遂驚覺兩目復明此卽經中所稱滅惡信經之驗也又若有邪見愚執惡人覩持是經生諸惡逆偏眼邪視乃至起一惡心發一惡言妄生謗讟持經之人其罪深重命終之後墮大地獄永無出期偏眼邪視傲慢不恭之貌謗誹議也讟詈毁也引證滏陽趙修復曾於觀中見道士持誦玉皇經極口詆毁一日晝寢夢一綠衣一紫袍者乘馬叩門厲聲責之曰汝狂肆輕慢誹謗玉經我等奉勅追汝修復心甚悚懼哀吿二公曰某愚昧無知追悔莫及惟願哀憫寬宥指示二公曰汝能造玉帝尊像朝夕持誦玉皇經當罪滅福生修復唯唯聽命二公引至一城但見騰騰業火燒空重重鋒鋩遍布受罪之人或在鑊湯之中或在爐火之内或受碓搗或被鋸觧男抱銅柱女臥鐵牀鎔銅灌口鐵犁耕舌悲號萬狀慘不忍聞二公曰此皆不信大道沉淪受苦者爾若非悔攺心切一墮此中永無出期矣言訖命使送囘修復遂甦至若在世男女得遇是經不生敬仰穢手污觸暈口讀誦牀榻不淨便將安置或誦是經講習俗語共相戯笑以爲常典如是之人命過之後墮無間獄永無出期殃延宗祖受拷酆都累及子孫害遺後代是人於地獄中厯無量劫受大苦惱縱遇聖教累承救拔罪惡小減又遇上聖殊恩得離地獄生餓鬼中厯千萬劫不聞漿水之名鬼報得盡生畜生中畜生報己若生人中復生邊夷外域而復女身貧寒困苦癃殘百病受無量苦人所惜棄求生不生求死不死輕斯經故獲罪如是此言慢經之人不但己身永墮地獄且殃延宗祖害遺子孫厯無量劫而其罪不減甚矣玉經當尊敬而不可輕䙝也餓鬼道畜生道及托生邊夷外域不定是輕慢䙝侮玉經之人而輕慢䙝侮玉經者必墮此數道大道無欺誑天尊豈漫爲是說以恐懼無良者哉引証相州劉滿開暈飯館爲業一日病急有靑衣吏持東嶽牌來追滿哀吿吏欲求少寛與家屬訣别吏不許遂驅之行走曠野中日色慘淡如深秋向晚時約行數十里遇一戴花人從東而來見滿揖之乃鄰家子也握手而泣問曰我家人安否汝今已死在生積何善事滿曰醮謝北極未嘗缺也戴花人曰此亦善事也吾先往爲汝圖之疾馳去靑衣吏推滿復行過一土山見宮闕威嚴守禦者皆鬼狀吏坐滿於門等候須臾戴花人出吿滿曰吾爲汝問吏言汝所殺物命索償其詞甚𡨚奈何但汝能皈依玉皇大天尊玄穹高上帝庶幾有濟門開滿隨眾入見猪羊鵝鴨皆怒目作人言曰還我命來滿懼連誦聖號數遍口中紅光噴出猪羊鵝鴨之類盡從光中升空而去王謂滿曰𡨚對生天汝當還矣滿方拜謝欲出有吏吿王曰劉滿旣至此宜令見生平造業之物王許之吏卽付一卒押送過廊廡數間北面一殿有官正坐座後有門卒推滿入見一池食物無所不有皆臭穢不可近卒曰皆汝所作之業令食盡方去滿復念聖號口吐紅光將穢物燒盡獄卒俱合掌讃歎滿出王仍命靑衣吏帶滿從舊路歸見相州城下濠水淸淺靑衣推滿入水中遂得復甦旣安捨宅爲觀罄家資造玉皇聖像終身䖍誦玉皇經不輟吁劉滿一念聖號罪業立便消除則慢經之罪不問可知矣又復有人初雖信受後復慢易善惡童子上奏三官黑簿書名靑編減算身歿之後拘閉幽牢往復三塗無由觧脫或於見世受種種病疥癩癰疽以爲果報憂悲苦惱日夜相煎或身被橫惡所加或牢獄繫鎻或非命自害毒藥所殘或被虎狼毒蛇之所噉食或爲𡨚債之所牽引或行山林値遇惡人被他屠割推落崖岸或被邪精魍魎之所殘害或爲水火之所漂焚或被刀兵之所橫誅輕斯經故橫喪天年獲如是果獲如是報可不悲與可不痛與初爲信受之人後存慢易之心其罪更大故不但幽閉酆都而陽報種種尤極慘毒黒薄所以記過靑編所以錄功皆三官所掌十二年爲紀六年爲算過䧟於不知者猶輕知而故違者罪重初信受而後慢易不獨有初鮮終而昧𨚫本良忍心背叛較前數條爲甚有不受種種果報者乎引証道士沈復初狂慢疎忽皇經破壞不加修整扯碎拭桌一日醉臥夢天將以火燒之苦不堪忍徧體皆裂舌長尺餘號呌數日而死此卽慢經之報也是宜殷勤依此奉行勿生邪念若諸念不生萬緣頓息塵沙惡業隨心消散一切灾魔自然殄滅此經功德不可思議是誠無比最上妙法諸經之王有大利益非人勿示殷勤拳拳奉持之貌諸念一切妄念也萬緣一切情緣也塵沙難以算數言惡業之多也諸經之王猶言諸經首領尊無二上也非人勿示非遇尊經重道之人不可輕傳也引証元黃德甫敬奉道法捐資刊玉皇經發願印施千部一夕燃燭諷誦至末卷未竟忽烈風大作一人從空而下竦立於傍身長丈餘手秉巨筆毫芒光燦口眼火熖爍人竊視之乃雷霆本部督也德甫恐懼伏地神厲聲曰汝所印之經不可妄施與人須令當面誦讀一遍字句不差方可相授敬之愼之言訖不見自是德甫如教方施經中所謂非人勿示者其斯之謂與若諸天人五衰四相輪迴侵逼能除妄想受持是經坐招自然天福益固身度三界與道長存天人欲界下天之人也五衰四相見神通品侵逼不能脫離之意坐招自然不待思求自然坐獲也大道厯劫不壞持經之人心與道俱故其身與道長存引証太平州人孫夀獵於海濱縱火延燎草木蕩盡惟一叢草甚茂火到便熄並不焦萎夀疑其中有伏獸近前窺視見一磚塜經久雨傾䧟露出木棺石碑銘云大漢延平二年念玉皇經李氏女墓野火不及蓋由此也夀念棺中必以經附葬焉遂命僕棄鷹在地掘開磚塜啟棺視之女體尙温顔色不變頭邊有木匣一箇經果在内經袱雖朽而經如故焉夀取以歸爲易新棺製衣衾重葬之此經所謂身度三界與道長存之驗也是此經典無與等無能勝是大威德大神咒能令一切枯槁便生枝葉花果茂盛能除眾生極重苦惱能令短命眾生而得長夀此經功德不可思議歎莫能盡無與等一切經典莫與比也無能勝一切經典莫能及也大威德者威以德顯邪魔恐怖而鬼神欽敬也大神咒卽前大光明圓滿神咒也枯槁之物尙沾經功而茂盛况人爲萬物之靈果能信心奉持豈有不獲善報者乎引証士人嚴訥訪友外出妻李氏在家一旦無病暴卒是日訥過蒼湖見其妻履水而至訥驚問之妻泣曰我已死矣此間北雁村有嚴先生抱奇術若往求之我庶得生遂不見訥至村訪問果有嚴先生課蒙爲業訥造門求救嚴初怒拒哀懇久之方曰殺夫人者王將軍也葬在君宅堂西柱下急爲建醮持誦玉皇經則尊夫人可活矣訥急囘請道士建醮誦經纔半部其妻已開目經完便坐起曰王將軍致語承君功德不敢有忘遺骸葬此堂西柱下懷中一劍請留以酬君惠掘之果然遂擇地厚葬之此經所謂能除眾生極重苦惱能令短命而得長夀之驗也若不宿植道本廣種福田乃至經名尙不得聞何况得見是經宿預也植栽也本根也積善獲福報謂之種福田如種田之獲稻粱也言人非宿植道本廣種福田則善緣淺薄經名尙不得耳聞何能得目見是經乎宿植道本卽獲宿命通之謂從來今生向道專篤者未有不自前生植其基也所以前因不昧是爲最難非種本深者鮮有不失者矣蓋是經依三洞眞格八萬劫一傳此淸都至眞上聖所寶秘於玉京金闕甚爲微妙難可得遇如宿有仙骨當爲九天眞仙之人得遇斯文承斯緣故後當齎金寶從師告盟受之方當乘機應運乃可付焉不得輕洩敬之愼之洞眞洞玄洞神謂之三洞金科玉律謂之眞格八萬劫者人生於寅盡於酉八運共八萬年也淸都上淸玄都也言此經微妙必須宿有仙骨當爲九天眞仙之人方可得遇又必齎持金寶從學於師告天立誓乘機應運而後可以授受也引証奉天縣尉馬敬持誦玉皇經十五年不倦忽於一夜見披甲神人狀貌甚異謂敬曰爾旣專心向道何不詣延康宮訪女冠李霞卿彼人姓名已登仙籍秘藏皇經眞本能持誦之功尤倍常敬驚駭受命至旦詣延康宮試爲尋訪果有李霞卿者修眉玉顔飄飄若仙旣接坐道及神人所言之事霞卿曰小道秘藏此經無人得知今蒙神諭焉敢隱匿命女童連匣取至敬跪而受之持歸校舊日誦本方知語句脫略乃依本攺正此經所謂宿有仙骨當爲九天眞仙之人得遇斯文之驗也於是天尊珍重讃歎而說偈曰設使江河水波浪能生蓮慈烏毛能白如經故難遇設使龜生毛堪採爲衣服夜月能消冰如經故難遇設使蚊蠓足堪搆爲橋梁能載一切重如經故難遇設使黃口雀能銜諸大山擲之他方界如經故難遇設使一葉舟力能載崑崙浮度於大海如經故難遇設使諸水蛭口能生巨齒其大如象牙如經故難遇設使蓬蒿葉能覆無鞅界蔭庇崑崙山如經故難遇設使烏梟類同樹一巢棲銜食共反哺如經故難遇設使兔生角堪用爲梯磴上窮有頂天如經故難遇設使鼷鼠等緣於兔角梯至天能食月如經故難遇設使驢顔唇色如蘋婆果復能作歌舞如經故難遇設使蠅蟲等能飲鍾石酒迷荒而沉醉如經故難遇珍重讃歎者珍重玉經之寶貴而讃歎其難可輕遇也設使云者萬一或然之詞偈中所載皆事之所必無理之所未有者厯厯言之以形容經之難遇夫大道人所同具尊經自在天壤何以難遇若此蓋以傳之者未必如元始之眞受之者未能契玉皇之秘扞格難通故雖遇如未遇也爾時天尊宣說偈已普吿四眾世間若有持是經人名功德身一切有情被其蔭故有利於眾曰功有恩於眾曰德有情者世間一切含生之類蔭覆冒也引証宋李惟一開雜貨舖每日於舖櫃誦玉皇經一遍櫃下有一母雞抱二十四卵兩月不生一夕夢一羣人羅拜其前曰我輩今脫禽類得爲人身皆沐超度之恩李覺而怪之旦視所抱雞卵皆成空殻矣持是經人名神通身一切吉祥咸臻集故神之所到觸處皆通故曰神通吉吉慶之事祥祥瑞之徵咸臻集者諸福畢至也引証司馬喬卿丁母憂發願剌血寫玉皇經以報劬勞寫未一卷庭前生靈芝二本長一尺八寸紫蓋綠蒂日𤃉汁一升取飲之味甘如蜜喬卿服闋後召爲揚州剌史終身亨泰持是經人名淸淨身一切惡業不能侵故惡業災殃也侵逼害也引証唐陸康成任京兆法曹一日坐堂見亡吏抱案牘約數十種陸問之吏對曰來年兵亂此皆劫中之名姓陸曰得無有我乎吏曰有陸大驚曰君乃舊吏何不用情吏曰以此故來報知惟誦玉皇經可免言訖不見陸求得經日誦不輟明年朱泚反迫爲御史陸叱曰賊臣敢亂唐室而污國士耶泚大怒令數十人圍而射之陸閉目誦經一無所傷泚曰儒者以忠信爲甲冑信矣命釋之持是經人名威德身天魔異道不能攝故威德德著爲威不假怒而自威也天魔諸天之魔也異道山精木魅也懾悚攝驚怖之意引証譚周敬慕道法常誦玉皇經一曰擕僕訪友抵暮未至投宿旅店比寢忽門戸開闔震響殊甚若有冦入之狀周大驚朗誦帝誥時燈已滅恍惚見一官人襴幞端簡拱立牀側響聲遂寂達旦欲詢店主而不果倉惶出門途中僕吿曰昨晚假館之榻有婦人縊死夜間常出爲祟周方悟所見官人乃里社正神暗來護衞魔鬼不能攝也持是經人名無等身上帝遙唱萬神敬故無等無與等也遙唱帝喜樂道之人天音贊揚如相唱和也引証隋慕容文遠病中見鬼使來拘卽隨行入城進一王府見殿上坐一王者文遠下拜王問曰汝在生有何功德文遠曰惟旦夕持誦玉皇經王驚起合掌稱善曰若然當願聞令登金牀坐誦纔一卷忽然遺忘有一玉女頂翠鳳冠披五彩服手捧文遠所誦經跪布其前文遠對經誦畢黃雲滿庭有繡衣童子自空而下謂王曰上帝有旨慕容文遠持經功大宜速放還王遵旨命原使送囘病遂愈持是經人名堅固身惡劫大難不能損故向道專一心無退轉故其身堅强貞固雖遇劫難不能損壞引証士人劉天澤持誦玉皇經始終不懈端平丙申賊兵犯蜀家人先遁劉負經出門正遇賊兵叩頭求免且默誦玉皇寶誥賊兵連砍數刀如有障隔羣驚爲神釋之得免持是經人名道藏身口出語言鬼神仰故藏府庫也持經之人妙法神功無不周備是大道之府庫也語言發爲德音故令鬼神欽仰引証唐呂文展持誦玉皇經至萬餘部年旣衰老口牙俱落向經懇求牙生如故郡中雨暘不時太守委令祈禱無不立應一日夜坐誦經見諸王者冠冕龍衮手執玉圭長跪禮拜文展大驚下坐叩頭曰某下界凡夫安敢當此恭敬諸王者曰我等上界天主適見此間有光燭天謂是上帝化身在此故相率前來供奉爾珍重讚歎而去持是經人名慈悲身六道眾生賴其善故賴其善者六道眾生賴持經人之善力除罪增福脫苦生天也引証唐李邱一好畋獵一日見鬼使來追自云姓焦名策相隨至陰府見王王曰汝好殺物命今須償還須臾見諸禽獸相向索命邱一怖甚吿王曰某曾誦玉皇經百部可凖得否王驚起曰此經能滅一切罪惡遂命檢邱一功德簿還白如言王曰玉皇經最上功德汝能持誦利益不小乃召所殺諸物令邱一誦經超度念纔三張囘顧庭中禽獸皆不見誦畢王命焦筞送邱一還筞出曰子歸何以報我邱一許錢三百千辭不受許造經五部筞曰可也及甦如約造經復夢筞來謝云承君功德已生天矣持是經人名大道身出入所在無怖畏故大道坦蕩寛平持經之人念念是道故無畏怖引証衡邑老儒忘其名一夕過江喚渡操舟人皆酣臥不應遂靜坐誦玉帝誥隔岸一漁翁獨釣江畔遙見二人自波中來私相謂曰岸上老儒喚渡已久汝急去取之一人答云彼正念經未可近也良久其人又曰可矣恐過此時又待三年答云彼念經不輟衞護甚嚴奈何時交五更二人入水而沒漁翁知其爲鬼移舟至岸吿老儒曰向者呼渡見二鬼伺間欲來相取聞云念經不敢相近不識所念何經老儒曰吾平日持誦玉帝寶誥雖暮夜獨行永不敢廢漁翁遂載以渡持是經人名良醫身善行妙法安樂人故善行開度之妙法救災弭患人皆安樂故持經之人不異良醫之治病也引証譚應乾閉戸誦玉皇經數十年不倦時兵革之後疫氣大盛譚往誦經無不立愈比兵來往皆驚歎曰此老異人戒勿驚擾各以錢米等物與之而去持是經人名光明身常爲帝光所攝受故上帝威光無所不照昏昧者如有所隔惟持經之人性天明朗心通帝座故常爲帝光之所照臨引証隋趙居易常持誦玉皇經一日暴卒至冥府見王王曰諸罪中殺生最重爾以猪羊充庖應當受報命以五長釘釘居易舌及手足釘時金光罩體遂不復釘又有一長安人姓高名湻王曰汝曾誹謗親長令左右拔舌舌上有光高二丈餘亦無所傷王問掌善吏曰此人有善在福簿否吏曰有此人曾在黃童觀看玉皇經一卷大有至誠王命鬼吏送二人囘居易旣生遂訪高湻其家人曰近日還魂已入道矣居易自此持齋修道永不茹暈持是經人名自在身天宮妙境神能遊故持經功德說不可盡持經之人五藴皆空四相俱冺得大自在天宮妙境如三淸玄都玉京金闕等處是也末二句總承上文引証嘉定任自信常持誦玉皇經一日過洞庭湖見龍王廟甚爲壯麗欲入賞玩居民止之曰此神躁暴無得輕犯君毋入焉自信笑曰吾受三天淨戒持始靑妙典以信待神神果有靈不我害也言訖遂入四處遊覽出經於殿之西楹誦之約三更聞牕外絲竹嘹喨車馬喧闐有赭袍金冠者乘輿而來揖自信曰先生崇修大道功德無量幸降敝居稍伸敬仰遂邀自信同行不三五里抵一城見瑤池玉闕寶樹琪花眞蓬島也王下輿拱自信入宮設碧玉几施錦地衣率眷屬侍立座前聽自信誦經自信誦至三卷開目見王與諸眷屬長跪座下自信大驚遜謝王復出金銀珠寶羅列殿前自信堅辭不受請行王命駕輿送至原處越半月抵家家人曰十日前有數人荷担而來皆奇珍異寶云是爾送來自信具述其事後隱入靑城山莫知所終又若道士志人能結法壇著新淨衣於夜半後闃寂之時獨處淸淨室叩齒九通東向端坐誦詠是經於是時也天眞御几玉𡚱拂筵萬神班列諸天臨軒三界侍衞五帝司迎道士志人修道之士有志之人也闃寂萬籟俱靜也此言如法誦經則諸神敬仰彼䙝慢者其罪當何如耶引証唐李修丁父憂剌血寫玉皇經纔一部筆頭現五色神光寫至十部筆毫一無所損院中嘗聞異香案前時落奇花每當夜靜持誦彷彿見無數神將合掌恭敬又能閉目靜思存想是經不覺身處五色雲氣之中俄見其身光明赫奕上昇天宮眾眞下迎心有所請一切應奉仙丹妙寶隨意自得宜當依科冥心奉行不但結壇諷誦者獲大利益卽閉目靜思存想是經則其心己與帝座相通而諸神敬仰所願俱得矣引証饒州銀山老人持誦玉皇經數十年不懈一日鄰火不戒延燒千餘戸惟老人一家居中而火越過其居一無所燬人見有無數神將圍繞保護年九十餘仙人與以金丹服之飛昇此經乃自三世金仙十方大聖皆從此經依科修奉故得超證無上妙道是兹玉帝諸天之師眾聖之王存想是經獲無窮利益故三世金仙十方大聖皆依玄門科儀修持而遵奉之超拔擢也證成就也化及萬方故曰諸天之師浩劫欽崇故曰眾聖之王引証安陸仇端持誦玉皇經甚䖍一日鄰火延燒一切諸佛典籍俱成灰燼惟此經與帝像毫無損壞經所云諸天之師眾聖之王觀此益信是故凡夫値遇是經精一修奉乃至五帝輔翼召使羣仙御役神官運導陰陽千靈敬仰萬神懾伏百邪避路羣魔束形命過之後卽得南宮受煉飛步上淸逍遙自在與道常存不特金仙大聖從此超證卽凡夫値遇是經精誠專一修持崇奉則五老輔翼其進修羣仙咸受其召使神官皆爲所御役運導幹旋也南宮朱陵府度魂煉魄之宮也引証道士周契玄常持誦玉皇經發願䖍寫百部未就而卒七年後忽於空中喚諸弟子云吾是汝師周契玄初死見冥王王問在世修何福業吾以持經事答王曰師旣有此莫大功德當往生上淸不復留此矣今已七年吾所許皇經百卷尙未寫完汝等可爲吾續成之以滿善願諸弟子問師何不現身曰吾自生天身軀長大若出現恐驚壞汝等也又復世間眾生得聞是經心生渴仰能於家庭擇淸淨處畫帝尊像日夜䖍䖍晨昏濟濟香花燈果尊重供養稱讚聖號瞻禮誦經是人當得三十種上妙功德䖍䖍誠敬不二也以心言濟濟威儀中式也以身言引証唐王法進幼而好道供玉帝像勤奉香火誦經不輟一日有靑衣童子自天而下謂法進曰上帝以汝皈依誠敬勅命召汝不覺騰身空中徑達帝前法進叩首帝命起立賜玉杯霞漿併授靈寶淸齋吿謝天地儀文使傳於世帝復命曰龍虎之年復當召汝後法進以壬辰年昇天一者諸仙讚重二者先亡生天三者宿殃解脫四者所往通達五者無盜賊事六者所求遂心七者除水火厄八者橫事潛消九者夜夢吉祥十者疾病不侵十一者智慧聰明十二者人見歡喜十三者衣食豐盛十四者子孫榮貴十五者六親見喜十六者門族和睦十七者除三惡報十八者轉女成男十九者形容端嚴二十者爲國大臣二十一者生爲帝子二十二者鬼神欽仰二十三者得宿命通二十四者諸神護念二十五者九族受蔭二十六者處世長年二十七者有情賴善二十八者魔王保迎二十九者决超三界三十者白日上昇讚重者讚歎而尊重之也所往通達隨其所往毫無阻礙也宿命通者宿世命運記憶通徹也護念者保護稱念也九族高曾祖父已身子孫曾玄也有情賴善謂六道四生賴善力而濟度也保迎保舉迎接也决超决然超昇也爾時天尊復告四眾曰此經功德能碎鐵圍諸山竭苦海水破大地獄拔諸罪苦降暴惡魔護諸國土能滅一切惡鬼能除一切重病能解一切惡毒能離一切惡人能伏一切毒獸能摧一切邪道一切諸天皆自尊敬其餘功德說不可盡造業之人生前沉淪苦海死後墮落牢山倘能得聞是經則鐵圍山碎苦海水竭大地獄破而超登道岸矣惡毒如蠱毒魘魅之類邪道如妖術符咒昏人神志也摧破壞也此總敘皇經之功德自度鬼拔罪降魔護國外如滅惡鬼除重病解惡毒離惡人伏毒獸摧邪道威光所照無惡不消法力所通無殃不解誠哉爲諸天師眾聖王也天上地下萬靈眞宰有不奉爲法寶而尊之敬之者哉引証豫州張政尊奉大道持誦玉皇經一日得重病有四人來追同行入城見在世傳經道士從署中出裝束奇異如道像中眞人政遂迎拜道士駡鬼使曰如何妄追平人鬼使惶懼道士引政見王王下堦相迎上殿對坐道士曰張政是吾弟子持誦皇經多年妄被追來可速放還王曰略俟勘對此人夀算及祿簿道士忿然作色王急索帖判放去字仍命王重責鬼使王乃枷追者四人於廊下道士領政辭出徧看地獄見大鑊行列燃火煮人痛苦哀號更有鐵牀炭火燒炙人皆焦枯又有蓬頭婦女三人黑中伫立向政叩頭云不得食者不知幾時矣政朗念玉皇經見牛頭馬面及夜义諸惡鬼皆合掌跪聽受罪眾魂悉升空而去道士以杖擊政遂復活病亦瘥爾時道塲大眾金仙菩薩眞聖眷屬聞是說已歡喜踴躍稽首敬禮而作頌曰大哉至道無宗上眞上度諸天下濟幽魂上無師祖惟道爲身丹臺紫府金闕玉京秘此妙法溥福含靈滅我萬罪增我遐齡萬神朝禮魔王保迎功德昌盛黃籙書名𣺌𣺌億劫使我長存至道謂玉經也無宗上眞言無本無始而具最上至眞之妙法是以上度乎諸天而無不周下濟乎幽魂而無不徧也身體也言此經無師無祖惟以道爲體也藏於丹臺紫府貯於金闕玉京溥福乎一切含靈之類誦之者滅萬罪增遐齡萬神瞻仰魔王欽敬功德極其昌盛黃籙書其姓名縱厯億劫而此身不壞也玄都仙籍鑄金爲簡故曰黃籙於是會眾說是頌畢稽首皈依奉辭而退玉皇心印妙經上藥三品神與氣精恍恍惚惚杳杳㝠㝠存無守有頃刻而成迴風混合百日功靈默朝上帝一紀飛昇知者易悟昧者難行履踐天光呼吸育淸出玄入牝若亡若存綿綿不絕固蒂深根人各有精精合其神神合其氣氣合體眞不得其眞皆是强名神能入石神能飛形入水不溺入火不焚神依形生精依氣盈不凋不殘松栢靑靑三品一理妙不可聽其聚則有其散則零七竅相通竅竅光明聖日聖月照耀金庭一得永得自然身輕太和充溢骨散寒瓊得丹則靈不得則傾丹在身中非白非靑誦持萬遍妙理自明玉皇心印妙經終誦經後念十遍再誦補闕文至心皈命禮金闕玄穹主高上玉皇尊諸佛聖師萬天帝主演三卷五品之妙法周十號萬德之洪名放十七大光明示三十種功德拔度生死運化古今一萬二千三十六字洞玄靈寶高上玉皇本行集經收金光咒元始天尊修煉雷霆日月交合星宿璇璣五炁交結運動乾坤威震霹𩆝邪鬼滅形五明交合萬道明輝周行事畢隨吸歸身五靈混合我得長生囁唎口順㖀鳴唎𠸩𠼳哼𡄳唎大有妙庭囘向懴悔文伏以龍章鳳篆已殫歌詠之誠鶴駕鸞輿重冀鑒觀之惠臣謹炷眞香再拜奏啟道經師寶元始萬神玉光會中一切聖眞恭望恩光俯垂證鑒臣向來看誦高上玉皇本行集經三卷一遍專爲某人某事伏念某所宣經典罔敢不䖍其奈業力障魔神志錯亂所立根鈍自然想來脫畧混淆顚倒重疊臨文狥意字誤句差乖淸濁之正音泥解會之邪見事奪其志心不在經問對起居斷絕隔越久誦懈怠因事忿嗔嚴潔或涉於垢塵肅敬或流於䙝慢身口服用之不淨衣冠禮貌之不䖍供不如儀處非其地卷舒揉亂墜落脫傷不專不恭大慚大愧伏願慈悲憐憫赦釋罪愆庶使誦持得臻感格所祈所願如志如心尙慮經中傳授或誤刊寫多訛其師其人悉皆懴悔仗道威力願罪消除常轉法輪普度羣品爲如上緣稽首稱念太上無極大道三十六部尊經眞文寶符三淸三境虛無三寶天尊玉皇赦罪大天尊玄穹高上帝十方眾聖玄中大法師玉經中無鞅數眾神仙覃恩不可思議功德收讚誦經功德神妙難思幢旛接引拜彤墀玉液酌金巵佛果仙姿超證樂春熙大聖玉皇滿願大天尊三稱三拜皈依三寶自皈依道當願眾生形神俱妙與道合眞一拜自皈依經當願眾生精持妙典獲大神通一拜自皈依師當願眾生功圓行滿應詔飛昇一拜太上元始天尊說玉皇本願尊經爾時元始天尊在鬱羅蕭臺玉山上京與五老上帝三元大帝十極高眞無鞅仙眾說無上至眞妙道開悟天人忽見祥光萬道充滿虛空旋結成篆絡繹可紀時有慈悲度厄眞人尋聲救苦眞人濟生度死眞人萬福護身眞人卽從座起越班而出稽首作禮上白天尊曰未審今此玄苑以何因緣特現金光妙篆天尊凝神良久言曰光嚴國内妙樂土中嗣位儲君以淸淨心發宏誓願緣放神光成斯妙篆四眞再拜稽首白天尊曰光由願起篆借光成所發何願請言其實於是天尊卽命上元捧硯五老執筆仰睇雲篆而述其願一願萬二千天不相背害二願九萬億光琉璃燦爛三願厯劫種親早登道果四願所有眷緣福慧增添五願東山碩儒賢聖文物六願西域袈裟立地參禪七願在在處處身住妙樂八願世世生生無有淪毁九願生吾國者不復女身十願侍吾前者與吾同尊十一願聞吾香者承恩受度十二願稱吾名者五逆不干十三願常覩慈顔不視邪色十四願耳聞妙法諦聽眞詮十五願鼻觀寂靜常嗅妙香十六願舌無雜味恬淡太玄十七願身無困憊久視常樂十八願意不散亂守我三元十九願自修自證普度羣品二十願人過人惡皆屬已愆二十一願怨我仇我時下消釋二十二願親我德我聽其自然二十三願卑者就下非汹非湧二十四願高者聳峙不騫不崩二十五願水陸禽蟲爲麟爲鳳二十六願山川草木成桂成蘭二十七願因親及親同赴帝京二十八願從劫至劫不墮凡流二十九願忍辱仁柔堅固道體三十願度人無量永證金身三十一願玄座說法天人悅慶三十二願讚詠洞章金仙雲從三十三願山林坡坂無復高下三十四願四維八極至邇非遐三十五願所有宮殿金玉成飾三十六願所經雲衢寶網交加三十七願鈞天妙樂隨光旋轉三十八願祥雲紫霧常護玉軒三十九願玉樹仙花珠實蒨燦四十願芝草綿覆景秀丹田四十一願火棗交梨密綴林樹四十二願仙丹妙寶羅列後前四十三願陰陽和合非寒非暖四十四願華池頻浴何盈何淺四十五願所服裳衣無損無縫四十六願所食雲饌無欠無餘四十七願飛鳴應節皆中玄韻四十八願龍戯麟盤翔舞天端四十九願慈光徧燭有求皆應五十願威德無極莫敢不從五十一願初證仙品各思踰舍五十二願未登道岸勇往直前五十三願割愛學道爲吾弟子五十四願行藥治病亦列仙班五十五願敷揚神功恢宏正化五十六願舍己血肉永斷慳貪五十七願我願人願人願我願五十八願願亦非願非願亦願天尊卽說偈曰玉帝功德大宏誓深如海廣修無量劫應證無上尊十方悉皈依仙佛神聖師金童收雲錦玉女納寶函天龍常擁護諸眞不得聞我爲汝畧說大眾宜諦聽是時五老上帝三元大帝四大眞人及諸仙眾聞是偈已各各歡喜踴躍稽首頂禮天尊奉辭而退太上元始天尊說玉皇本願尊經全東方第一眞文神咒東方九炁始靑天中靑靈始老九炁天君眞人按筆下注臣身木德秀炁會道合眞金章靈符圖此符治肝經受病黃紙硃書化服立愈南方第二眞文神咒南方三炁赤靈丹天丹靈眞老三炁天君司命司祿絳闕尊神火德明秀會道合眞金章靈符圖此符治心經受病黃紙硃書化服立愈中央第三眞文神咒總監眾靈十二支天黃靈元老十二天君都錄交籍主鎭脾神土德鎭秀會道合眞金章靈符圖此符治脾經受病黃紙硃書化服立愈西方第四眞文神咒西方七炁太白之天皓靈皇老七炁天君記名安魄主鎭肺神金德監秀會道合眞金章靈符圖此符治肺經受病黃紙硃書化服立愈北方第五眞文神咒北方五炁玄中之天五靈玄老五炁天君追生落死主鎭腎神水德華秀會道合眞金章靈符圖此符治腎經受病黃紙硃書化服立愈皇經持誦儀制玉律曰持是經人不拘道俗男女俱宜齋䖍精專不二凡設皇壇務要北房正面向南無論觀廟家庭只在潔凈嚴肅發願諷經者月前齋戒香湯沐浴更換新淨衣服潔清鋪蓋獨處靜室戒定身心焚香熏壇灑水淨穢先期具表奏聞當夜子時分持經人等俱執笏稱臣於囘向中宣意先擊報鐘三下白聖曰本行集經開度眾生金鐘一響殄滅邪精金鐘二響掃蕩㐫星金鐘三響地獄皆空羣生聞者百福來臻吾奉玉皇上帝律令勅一拜入壇上香五拜懸旛咒曰赫赫陽陽旛挂中央萬神列隊護衞經堂千妖滅爽萬穢消亡寶旛所指興利除殃稍有違誤玉律施張急急如玉皇上帝勅令一拜囘壇一拜擊鼓三通頭次敲小鐘一下二次二下三次三下北面長跪擊木魚念七神咒至徑達三天句起立向上一拜焚接駕表三拜上香五拜念集靈咒一拜念開經偈一拜請笏禮奉一拜跪諷各誥每號三拜懴悔發願各一拜朝禮三寶三拜諷玄藴咒一拜諷彌羅誥頂禮九拜敲打鐘鼓唱開經讚三稱聖號三拜上香五拜叩齒九通一拜開諷上卷北面跪諷東向坐諷皆可凡遇天尊玉帝等字俱擊磬經畢起立一拜唱收讚敲鐘擊鼓三稱聖號三拜少歇剪燭上香五拜唱開經讚敲打如前三稱三拜開諷中卷經畢起立一拜收讚如前唱敲稱拜少歇剪燭上香五拜唱開經讚敲打如前三稱三拜開諷下卷經畢起立一拜念心印妙經九遍九拜念補闕文十遍十拜收金光咒一拜上香五拜執笏跪宣囘向懴悔文如奏對狀每遇聖號一拜收讚如前唱敲稱拜皈依三寶三拜經完起立五拜落旛咒曰旛懸寶號普利無邊諸神衞護滅罪消愆經完旛落雲斾囘天各遵法旨不得稽延急急如玉皇上帝勅令每逢朔望申奏諷過經數及布施人等姓名如朔望逢戊停經勿諷篇内所載科儀不可簡省缺略致干譴責若有善信不能自諷延請禮誦功德相同玉皇本行集經跋玉皇本行集經乃以上天帝座譬人心之帝座中有主則百體從令如玉闕之尊統馭萬靈然天不言而𡻕功成日月星辰風雨露雷以及寒暑往來晝夜推遷主宰綱維不愆不忒實天爲之也人之一身屈伸俯仰呼吸運動各得而弗違實心爲之也故人之有心卽一身之帝座遵而奉之合乎天行之自然含無守有卽得主而常住矣此篇經大丞相及文帝詮註已無遺藴故仍卽訓言釋繹使讀是經者知從事於治心之法卽仰合乎玉皇之本行而深副乎玉皇之本願矣乙丑夏南水盛漲本壇諸子矢愿廣布此經以濟劫運於未然故爲敬識數語於後宏教司柳守元謹跋
