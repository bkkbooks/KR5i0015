body:
  text: 太上大光明圓滿大神咒品第二爾時天地始祖五老帝君稽首長跪白天尊言伏聞高上玉皇慈念蒼生普放神光照燭法界六凡四聖普叨道蔭竊以凡夫短景劫運將終正道宜行以濟兆民使修眞之士有期輕舉末代烝民俱獲夀考當天尊宣說神通品之後法筵清眾中又有天地開始之祖五方五老帝君長跪道前言曰伏聞玉帝慈悲憫念蒼生普放至大神光燭徹一切法界俾天人魔等之六凡仙佛神眞之四聖悉承大道庇蔭固已各得解脫矣竊念凡夫之景最爲短促世界劫運將次吿終玉帝眞經之正道急宜見諸施行以濟兆民庶修眞之士有了悟之期得以輕身冲舉末代烝民無夭扎之傷俱獲同登夀考焉自昔元始洞玄靈寶赤書玉篇眞文生於元始之先空洞之中天地未根日月未光幽幽冥冥無祖無宗無氣無象無色無名無形無緒無音無聲混沌太無靈文晻靄乍存乍亡靈圖開化玄象推遷結氣浮空乘機應會玉帝眞誥靈寶秘篆無上大不可思議神咒於是存焉玉帝眞經衍諸今日者固宜及時傳行而玉帝之眞誥藏諸太始者尤望俯賜敷宣因思昔日元始洞玄靈寶赤書玉篇眞文生於一元方兆之始太空洞虛之中此時天地未立根基日月未有光明幽幽冥冥焉而已萬象未生無爲之祖無爲之宗也無氣可嗅無象可呈也無色可見無名可稱也無形可指無緒可尋也無音可聽無聲可聞也當此混沌太無而赤書玉篇眞文晻然雖不明見靄然卻著端倪乍存乍亡非有也亦非無也迨太極兆而靈圖開化兩儀奠而玄象推遷玉帝眞誥靈寶秘密天篆無上功德至大而不可思議之神呪結氣浮空乘機應會於是顯著而妙道存焉原註靈寶赤書指下五老之誥此解亦未盡合所謂靈寶赤書玉篇眞文乃指玉帝眞誥卽彌羅誥也空洞之氣結成而五老之誥亦同結於空洞之中爾時混沌初分此靈寶赤書藏於玉清境内故五老以請若專指五老之誥是自爲請矣二元始字指元會之始而言不可認作天尊天地未根等句極言眞文妙處爲天地之根柢非先有赤書後有天地也故天地得之而分判三景得之而發光靈文鬱秀洞映上清發乎始青之天而色無定方文勢曲折難可尋詳天尊煉之於洞陽之館冶之於流火之庭鮮其正文瑩發光芒洞陽氣赤故號赤書靈圖旣煥五方朝眞飛空步虛旋行上宮燒香散花口詠靈章是時天啟十二玄瑞地發二十四應上慶九天之靈奧讚三天之寶章神風旣鼓皇道咸暢天尊登命太眞按筆玉妃拂筵鑄金爲𥳑刻玉爲書五老掌錄秘於九天靈都之館玉女典香太華執巾金童侍衞玉陛朝軒九天玉書非鬼神所聞玉帝眞誥生於一元方兆之始顯於兩儀旣奠之後實靈氣之所鍾也夫靈氣乃造化之根柢故天地得之而分判日月星三景得之而發光眞誥爲靈氣所鍾故其文鬱茂深秀洞洞乎映照於上清之境發越於始青之天其文之色則璀璀燦燦而不拘定方所其文之勢則曲曲折折而難以尋究推詳在天尊當日曾煉習之於洞陽重玄之館鎔冶之於流火大梵之庭鮮耀其正文瑩然騰發光芒洞陽之館赤氣瀰淪故號赤書由是上天下地煥然光明臣等職列五方瞻仰赤光相率而朝眞境飛步虛空旋繞上宮燒清淨之香散奇異之花口詠靈文寶章以誌一時之盛當是時也天不愛道而啟十二月之玄瑞焉地不愛寶而發二十四氣之徵應焉雖曰無心成化一似慶幸九天之靈奧而贊助三天之寶章也者神風鼓盪無窮大道普利一切天尊乘機應會登寶座而錫命太眞爲之秉筆玉妃爲之拂筵鑄黃金以爲𥳑刻碧玉以爲書臣等五老職掌謄錄但見靈都之館玉女典香太華執巾金童侍衞白玉之陛朝眞之軒藏贮九天秘書雖鬼神亦有不得而聞者經言五老掌錄之句亦要圓通看去所云掌錄者特記其事猶登號簿之意若已經掌錄其文五帝胡爲向天尊而復請之哉故天寶之以致清地秘之以致甯五方掌之以得靈三光乘之以高明上聖奉之以致神高靈尊之以致眞五嶽從之以得鎭天子得之以致治國祚賴之以致平實靈寶之妙德乃天地之玄根威靈恢廓普加無窮蕩蕩大化爲神明之宗其量莫測巍巍乎大空是時元始革運玄象開圖靈文鬱秀神表五方分判天地開化萬彙此玄宗之寶可得暫披其靈韞乎玉帝眞誥尊重若此故天寶之以致常清地秘之以致常甯臣等五方掌之而得靈日月星三光乘之而高明上聖奉之則聖不可知而爲神高靈尊之則靈極無加而成眞五嶽從之則永不崩壞天子得之則常享太平國祚賴之則奕葉不替誠靈寶之妙德乃天地之玄根論其威靈恢然莫量廓然無際塵沙法界普受利益蕩蕩乎化之大而無外洵神明之宗主夫孰得而測量之乎惟見巍巍於太空之中而已蓋元始之運方革玄象之圖乍開而靈文已鬱茂光秀神足以表正於五方分判乎天地開化乎萬彙誠哉爲玄門之至寶臣等雖職掌之而未仰窺其妙不識可暫時披閱其秘奧乎今皇道敷暢澤被十方仰觀劫運眞風宜行臣心實欲使靈蔭八遐風灑蘭林寒條仰希華陽之繁朽骸蒙受靈奧之津明眞有格今當以行仰對元慈下伸丹懇惟願哀憫俯念蒼生不審靈寶玉篇眞文可得見授下教於未聞者乎况今玉帝慈光上照諸天下徹世界皇道已是敷布暢達恩澤徧於十方矣仰觀劫數氣運正是眞風宜行之會臣等之心實欲使靈寶之法蔭覆乎下方八極之遠大道之風灑蕩乎天上蘭林之内蘭林卽寶香玄苑也使邪魔外道如枯槁無生意之寒條俱沾華陽甘露之繁滋異類傍門如已經朽壞之骸骨普受靈文奧典之津潤昔者所藏眞誥乃明眞度世之金格今正當播行世間臣等仰對玄元之慈下伸丹悃之懇惟願天尊哀憫俯念蒼生不審玉篇眞文可得見授臣等而下教於人世之未聞者乎於是元始天尊撫几高抗凝眞遐想觀時已至普爲時會一切眞聖論定陰陽推數劫會移校河源檢錄天度選擇種人指拈太無嘯朗九玄念無開聽於陳辭有若閉礙求眞之路是時五老帝君啟問不已良久元始天尊乃垂盼眥之容慨爾歎曰微乎深哉子今所叩豈不善乎此元始靈寶之玄根空洞自然之眞文生天立地開化神明鎭奠五嶽安國康民靈寶玄妙爲萬物之尊天啟玄瑞靈應自然於是天尊撫几高抗高抗者其容直也凝神遠觀見眞誥傳行之時已至普爲當時會上一切眞聖論定陰陽之往復推數劫會之大小移校河源之水帝檢錄天度之星官内中揀選種善之人爲之指拈眞玄太無嘯詠朗吟九品玄章念五老所陳之辭若不開聽則求眞之路未免閉礙又見五老帝君請問不已良久乃垂盼眥之容慨然歎曰微妙乎淵深哉子之所叩不亦善乎玉帝眞誥乃一元之始玄靈妙寶之根柢太空洞虛之眞文上而生天足以開化乎上界一切之神明下而立地足以鎭奠乎下界五方之山嶽厯代之國由是而安天下之民由是而康靈寶玄妙之章爲萬物所共尊天啟十二月之玄瑞地發二十四氣之靈應皆出於自然而非可强致者也移校水帝則盡乎下界矣檢錄星官則盡乎上方矣二句包上下一切而言不專指兩項今三天盭運六天道行雜法開化當有三萬六千種道以惑來者之心此法運訖三龍之後庚子之年雜氣普消諸天慶會吾眞道乃行今且可相付當錄於上館未得行於下世玄科有禁不得妄傳子可詣靈都紫微上宮聽天音於金格視俯仰於神王然後當使得受天文以統御元始之天也盭至也猶云天運至於此也今何時哉運固啟於三清之境道雖行於六六諸天而雜法曲説各自立教競爲開化總而計之有三萬六千種旁門外道煽惑後來學者之心此法運化已訖只待三龍之後庚子之年雜氣消盡諸天慶會之時吾之眞道乃行玉篇眞文今雖相付惜乎雜說正盛爾等但當錄於天館未可行於下世玄門科律有禁不得妄傳科律載在金格現藏靈都紫微上宮爾等敬往觀之親聽天音於金格之中更視俯受仰承之儀於守宮之神吏天王方可得受眞文而統御元始以來之天矣龍陽也三龍三陽也三陽至則泰運開矣庚金也子水也金水相生則生生不息此會皆可以傳道此正内宮龍虎交洽之義原注云三龍之後陽德衰而天地否豈道待否運而始傳乎且云必待天運重開於子而正道方行更欠理會當元始時正是方開於子若再待劫盡重開子運並此時此後道終無傳矣將等到何時而始傳乎於是五老帝君與諸眞聖清香執戒徘徊雲路宣命十方上詣上清太玄玉都寒靈丹殿紫微上宮受俯仰之格乃知天眞貴重難可卽聞還乃更詣元始道前諮以禁戒之儀遜謝不逮於是五老帝君與法會上一切眞聖燒清淨之香依玄門之戒徘徊雲路宣天尊之命於十方敬詣上清之天太玄玉都寒靈丹殿紫微上宮受俯仰之儀於神王然後知眞文貴重難以卽聞相率復至天尊道前諮詢禁戒之儀而遜謝已之智力不逮焉是時天尊慈顏愍諭靈關廓開登命五老帝君開洞陽玉館啟九光八色之匵披雲錦之囊出元始靈寶赤書玉篇眞文金書玉篆微妙秘密運御乾坤大光明圓滿大神咒玉章宣付五老帝君是時五老帝君拜受已及諸天聖眾稽首禮謝天尊玉帝仰奉道旨按法以傳是時天尊慈顏憫諭聖衷廓開進五老帝君於座前爲之開洞陽之館啟九霞光八景色之匵披雲霞錦繡之囊取出玉篇眞文彌羅光明圓滿聖誥五老帝君稽首拜受後於是元始天尊更出五老眞誥以付玉帝玉帝仰奉天尊道旨按玄門正法而授諸五帝焉東方安寶華林青靈始老蒼帝所受神咒誥命東方言其向也安寶華林言其處也青靈始老東方屬木其色青言其具靈妙之德而爲老中之首也蒼帝言其爵也東方九炁始皇青天碧霞鬱壘中有老人總較圖錄攝氣舉仙東方九炁號曰青天主斯天者謂之始皇碧霞鬱壘之中有老人焉總校上天下地之圖籙調攝九炁而飛舉成仙也右度人錄仙青帝秘文二十四字書於九天元臺主召九天上帝校神仙圖籙𡻕星輔肝角亢鎭眞氐房心尾四景迴旋箕主七辰正斗明輪承炁捕非掃除灾羣𡻕星居木宮所以生人之肝者也角亢氐房心尾箕東方分野之宿也言七宿而東方諸宿皆在其中矣角亢則坐鎭而稱眞氐房心尾共呈妙景而迴旋有常箕主風而統七宿蒼帝赤符到處無有不正斗明輪承炁捕非掃除灾殃者右制星秘文三十二字書於紫微宮東華殿主召星官正天分度東山神咒攝召九天赤書符命制會酆山束魔送鬼所誅無蠲悉詣木宮敢有稽延東山神咒上而攝召諸天之眞聖赤書符命下而制服酆都之鐵圍山束縳妖魔驅逐鬼魅一概誅除莫能赦免有敢違木宮之指麾而稽延者乎右制魔秘文三十二字書於東華玄靈之館主攝鬼魔正九天炁下制東河溟海水神大劫洪灾蛟龍負身水府開道通逕百千上帝赤文風火無間東海謂之溟海其中水神惟神咒能制之故一遇大劫洪灾蒼帝則蛟龍負其身水官爲之開道瞬息可達千百里之遠雖風火不能如其速也右制水秘文三十二字書於九天東北玉闕丹臺主攝東海水帝大劫洪灾召蛟龍及水神事東方九炁靈寶赤書玉篇眞文合一百二十字皆太上無上大光明圓滿大神咒空洞自然之書一名生神寶眞洞玄章一名東山神咒一名青帝八威策文右玉皇誥命以錫東方安寶華林青靈始老蒼帝九炁天君令統御東方諸天諸地日月星宿名山靈洞水府泉宮上聖高尊眞仙聖眾一切威靈符命所臨如誥奉行此總承上文而推廣言之言此蒼帝神咒不但度人錄仙制星制魔制水已也凡屬東方上下一切等眾皆如誥所行而莫敢有違焉南方梵寶昌陽丹靈眞老赤帝所受神咒誥命梵寶昌陽赤光顯著之意離宮之象也丹靈眞老南方屬火其色丹言其具靈妙之德而爲眞聖中之老也南方丹天赤帝玉堂中有大神號曰赤皇上炎流烟三炁勃光神仙受命應會太陽南方謂之丹天白玉堂中有至大之神號曰赤皇職司火令故炎上而流烟三炁勃然生光諸神眾仙無不奉命而與太陽相應會焉右度人錄仙赤帝秘文三十二字書於九天洞陽之館主召九天神仙圖籙金名熒𤉹輔心井鬼守房柳星張翼統御四鄉軫總七宿囘轉天常召運促會正道驛行熒𤉹房火宮所以生人之心者也井鬼柳星張翼軫南方分野之宿也言七宿而凡屬南方之宿皆在其中矣井鬼守其度而不紊柳星張翼統御所屬之四鄕軫爲管轄之總宿其隨天囘轉各依常度召運促會悉由赤道正路如驛遞之挨行焉右制星秘文三十二字書於三炁丹臺主召星官明度數正天分赤文命靈北攝酆山束送魔宗斬邪滅根符教所討明列罪原南山神咒威伏八方羣妖滅爽萬試摧亡赤文命靈者赤文到處萬靈應命也酆都山有六天宮洞羣魔所居之處魔宗魔王之主也斬邪滅根不留餘孼也滅爽者滅其精爽也萬試摧亡者萬試無有不驗而羣妖摧亡也赤帝爲南方之神而能北攝酆山者蓋魔者鬼也鬼居北方火爲正陽之炁陰邪見之自應伏藏故統攝之右制魔秘文四十字書於西南陽正玉闕主制北酆正鬼炁南河水帝太伯龍王神咒流行普掃不祥洪水飛灾止蛟召龍開除水逕千道萬通敢有干試攝送火宮赤書所告莫有不從水帝龍王聞赤符之命爲之掃除不祥若查勘洪水飛灾則蛟龍開道而路無不通有相干者則攝送火宮治罪豈尙有頑梗而不受命者乎水神皆謂之伯龍王爲水神之長故曰太伯論五行生剋水能剋火而此云太伯水神俱聽命者三炁先天之火所謂朱陵是也卽所謂丹臺紫府也豈水所能剋哉右制水秘文四十八字書於西南陽正玉闕主攝南河水帝大運交期洪水四出召蛟龍及水神事南方三炁靈寶赤書玉篇眞文合一百五十二字皆太上無上大光明圓滿大神呪空洞自然之書一名南雲通天寶經一名九天無上之上咒一名赤帝八威策文右玉皇誥命以錫南方梵寶昌陽丹靈眞老赤帝三炁天君令統御南方諸天諸地日月星宿名山靈洞水府泉宮上聖高尊眞仙聖眾一切威靈符命所臨如誥奉行此亦總承上文而推廣言之言赤帝眞誥不但度人錄仙制星制魔制水已也凡屬南方上下一切等眾俱如誥奉行而不敢有違焉中央保劫洞清玉寶元靈元老黃帝所受神咒誥命保持劫運洞然清徹如玉之有寶光皆贊美之詞元者大也中央屬土其色黃故曰黃帝中央總靈黃上天元始生五老中黃高尊攝炁監眞總領羣仙典錄玄圖宿𥳑玉文催運上炁普吿萬神黃上天元黃帝位居最上而爲天之元老也中黃高尊中央黃帝高而且尊也攝炁攝中宮之黃炁也監眞監察諸天之眞以總領乎羣仙也典錄玄圖卽典守玄綱之謂宿𥳑玉文所謂𥳑在帝心催運上炁催促運會使眞炁流行也右度人錄仙黃帝秘文四十字書於太玄玉寶玄臺主召神仙玉𥳑宿命總仙炁鎭星輔脾迴度北元魁𩲃主非截邪斬根𩵄䰢魓𩳐掃穢除氛魒正玄斗明度天關九天符命金馬驛傳鎭星居土宮所以生人之脾者也魁𩲃𩵄䰢魓𩳐魒中央七星之名言七星而凡屬中央之宿皆在其中矣鎭星居中央在北辰之前有迴顧之象故曰迴度北元斗柄之星爲魒有宰正之義斗口無星之處爲辰乃天之樞紐譬如關焉四時隨天旋轉悉依程遞若驛馬之傳命焉右制星秘文四十字書於玄都玉臺主攝星官正天分數中黃總炁統攝無窮鎭星吐輝流鍊神宮勅攝北帝遏塞鬼門剪除不祥莫有當前流鍊神宮流化鍊氣於神宮也勅攝北帝遏塞鬼門幽冥居北方惟北極大帝專制之黃帝之勅可以統攝北帝遏塞鬼門蓋土與水有阻制之義也右制魔秘文三十二字書於玄都玉臺主攝北帝正天氣檢鬼精中山神咒召龍上雲制會黃河九水河源不得怠縱善惡悉分千妖萬奸上對帝君莫有干試太陽激燌赤書玉字宣吿普聞千妖萬奸上對帝君言誅除妖奸克對上帝也太陽激燌者言其威令之行如日光之燌射也右制水秘文四十八字書於玄都玉臺四壁以攝中海水帝四泉之水洪灾湧溢之數主召水神止蛟龍中央一炁靈寶赤書玉篇眞文合一百六十字皆太上無上大光明圓滿大神咒空洞自然之書一名保劫洞清九天靈書一名黃天神咒一名黃帝八威策文右玉皇誥命以錫中央保劫洞清玉寶元靈元老黃帝一炁天君令統御中央皇天后土日月星宿名山靈洞水府泉宮上聖高尊眞仙聖眾一切威靈符命所臨如誥奉行此亦總承上文而推廣言之言黃帝眞誥不但度人錄仙制星制魔制水已也凡屬中央上下一切等眾俱如誥奉行而不敢有違焉西方七寶金門皓靈皇老白帝所受神咒誥命七寶金門白帝所居之處皓者白也言其具靈妙之德而爲五皇中之眞老也西方屬金其色白故曰白帝西方素天白帝七門金靈皓映太華流氛白石峩峩七氣絪縕上有始生皇老大神總領肺氣主校九天檢定圖籙制召上仙七門七寶之門也金靈皓映金光靈炁皓然輝映也太華金氣也七氣七寶之氣也絪縕元炁交密之狀總領肺氣主校九天言總領羣生之肺氣而主校九天之玄籙也右度人錄仙白帝秘文四十八字書於九天素靈宮北軒之上主召仙炁舉仙道太白檢肺奎婁守魂胃昴畢觜主制七關參總斗魁受符北元太白星居金宮所以生人之肺者也奎婁胃昴畢觜參西方分野之宿也言七宿而凡屬西方之宿皆在其中矣守魂守其神而不動也天有七關象肺形也惟四星主之參星管轄列宿故總斗魁也受符北元玉帝所居爲北關言白帝赤符受於北闕而爲天之元老也右制星秘文二十四字書於金闕玄牕主攝白帝星官正明天數赤書玉字九天正文攝召萬炁普歸帝君普歸帝君萬氣總歸於帝君也此帝君指白帝而言與上帝君不同右制魔秘文一十六字書於九天金闕三圖之館以攝六天鬼炁西山神咒八威七傳符水上龍召山送雲在所校錄同到帝門輔衞上眞斬滅邪源若有不祥截以金關赤書符命風火驛傳八威七傳八方仰其威七門傳其令也符水上龍符行於水則蛟龍上升而聽令也召山送雲召送山之玄靈眞炁也帝門上帝之門也倘有不祥則有金關以截之而不容其爲患也右制水秘文四十八字書於九天金闕三圖之館主攝西海水帝及水中萬怪惡毒之精召雲龍以防水旱之灾西方七炁靈寶赤書玉篇眞文合一百三十六字皆太上無上大光明圓滿大神咒空洞自然之書一名金眞寶明洞微篇一名西山神咒一名白帝八威策文右玉皇誥命以錫西方七寶金門皓靈皇老白帝七炁天君令統御西方諸天諸地日月星宿名山靈洞水府泉宮上聖高尊眞仙聖眾一切威靈符命所臨如誥奉行此亦總承上文而推廣言之言白帝眞誥不但度人錄仙制星制魔制水巳也凡屬西方上下一切等眾俱如誥奉行而不敢有違焉北方洞陰朔單鬱絶五靈玄老黑帝所受神咒誥命洞陰朔單極北之處鬱絶鬱然敻絶而爲五靈中之玄老也北方屬水其色黑故以黑帝名北方玄天五炁徘徊中有黑帝雙皇太微總領符命仙鍊八威青裙羽䙱龍文鳳衣上帝所舉制到玉階徘徊迴環之貌雙爲陰數皇指黑帝而言太微居太微垣也領符命而陶鍊仙眞顯八方之威光也青裙羽䙱龍文鳳衣言其服飾之盛上帝所舉制到玉階言其受命之由右度人錄仙黑帝秘文四十字書於鬱單無量玄元紫微臺北軒之内主召諸眞人神仙圖錄北辰輔腎斗牛衞扉女虛危室豁落四開璧總七星執凶糾非卻灾掃穢明道動輝北辰星居水宮所以生人之腎者也斗牛女虛危室璧北方分野之宿也言七宿而凡屬北方之宿皆在其中矣斗牛兩宿對峙如扉爲北天之衞四開四面開張也璧星統領水氣故總七辰明道動輝明正道動有光輝也右制星秘文三十二字書於天心北元玄斗中主攝北方星官正天炁北山神咒激陽起雷流鈴煥落玃天振威北酆所部萬妖滅摧激陽起雷陰極而陽生之義流鈴雷神之名玃擒獲也擒獲天魔大振威風也右制魔秘文二十四字書於北方洞陰朔單鬱絶玄臺主攝天魔北帝制伏惡神萬鬼事九河傾訖鳥母羣飛蛟龍通道水陌洞開赤文玉書驛龍風馳鳥母水怪也黃河傾則水怪飛騰而爲害惟黑帝能制之右制水秘文二十四字書於洞陰朔單鬱絶元臺主攝北海水帝制水中萬精主召蛟龍興雲致雨事北方五炁靈寶赤書玉篇眞文合一百二十字皆太上無上大光明圓滿大神咒空洞自然之書一名紫微元神本命生眞寶明文一名北山神咒一名黑帝八威策文右玉皇誥命以錫北方洞陰朔單鬱絶五靈玄老黑帝五炁天君令統御北方諸天諸地日月星宿名山靈洞水府泉宮上聖高尊眞仙聖眾一切威靈符命所臨如誥奉行此亦總承上文而推廣言之言黑帝眞誥不但度人錄仙制星制魔制水巳也凡屬北方上下一切等眾俱如誥奉行而不敢有違焉道言是大神咒者元始之妙言玉皇之眞誥上清自然之靈書九天始生之玄札空洞之靈章上聖之秘語玉宸之尊典成天立地開張萬化安神鎭靈生成兆民匡御運度保天長存上制天機中檢五靈下策地祗宣命河源運役陰陽召神使仙此至眞之妙文神應自然致天高澄令地固安保鎭五嶽萬品存焉道言道會上清眾之言也言此神咒雖爲元始天尊之妙言而頒自玉皇則爲玉皇之眞誥靈書不假手筆而成玄札玄妙不可測識空洞太虛之謂上聖至人之稱玉帝宮闕謂之玉宸匡御運度匡扶統御運會化度無窮也由成天立地至召神使仙極言眞文之妙出於自然而然末六句咏嘆上文之意玉帝昔授五老帝君是時五帝跪捧其章秘題靈都之館天眞皇人敬書其文掌之於上清眞境太玄玉都寒靈丹殿紫微上宮累經劫運而其文保固天根無有毁淪與運推遷是大神咒混之不濁穢之愈清毁之不滅滅之益明大有之文天眞所尊自光眞名帝圖刻𥳑昭示來生斯文隱秘不得窺聞有得之子保萬炁長存勤行修奉克至神仙朝禮帝君天眞皇人敬書其文言至此方得書之於册則前此掌錄非卽書誥愈明矣天根無有毁淪天然妙化之根無毁壞淪沒也雜説混之而不濁俗議穢之而益清謗語毁之而不滅凶暴滅之而益明誠屬至妙大有之文自光眞名者自煥天光標其眞名也帝圖刻𥳑者運應帝圖刻之金𥳑也帝君謂上帝也總註皇經三卷上半言天道下半言人道此則舉天人之理而合之爲五品之樞紐蓋人稟五行之氣而生倘或惡星灾之邪魔擾之則五臟受病而死期至矣數者各有所制在身之五帝朝我眞元上天下地明顯幽冥一切萬靈豈不可以統馭而召攝之乎誥中句句皆喫緊爲人處有志於内功者可豁然解矣玉皇功德品第三爾時玉虛帝君白天尊言惟願慈悲普爲曰眾帝釋等及四梵天王一切諸天一切諸仙及未來一切眾生持是經人説功德事是時天尊謂玉虛帝君言快哉斯問不亦善乎汝以慈悲憫念眾生故請問於我汝當復坐吾爲宣説爾時玉帝頒誥之時四眾天神魔鬼也帝釋諸天帝主釋教諸佛菩薩也四梵天王四大梵天之王也諸天謂三十六天天主諸仙天仙神仙地仙也此章詳言功德下章方言利益上帝十七光明首重神通次重功德再次重利益餘光俱包括於三光之内而無能勝乃總括之光也故三品卽言功德以天經如是尊重誦持者豈有不獲功德之理故極言之觀下各條註内引証益知是經功德無量而天尊所言爲不虛矣天尊吿曰若有無量國土或兵戈並起疫氣流行水旱蟲蝗凶災饑饉其國王大臣發慈憫心爲其黎庶徧勅國内州縣鎭宰令諸道流清淨嚴潔於其觀内設大齋醮六時行道爲轉此經當得國土清平五穀豐熟黎庶安泰穀不熟曰饑菜不熟曰饉官之尊者爲鎭卑者爲宰清淨肅其内嚴潔肅其外也六時白日六時也轉諷誦也言國土當外患迭興内變四起之際惟此經可以轉禍而爲福引証唐朔方節度使張齊邱恭崇大道每旦更衣於三清殿前誦玉皇經一部數年不懈一日有偏將謀叛率數百人入衙欲害齊邱忽舉頭張口投刃於地瘖不能言遂被擒詢之俱云適見廳上有甲士四人各長丈餘提刀呵叱電光爍人某等皆如中惡昏暈倒地齊邱知是神人保護將謀叛者正法後朔方大旱一載不雨齊邱禱雨䖍誦是經甘霖立沛若復有人入諸山林遇毒惡獸但能存想一念眞經山神衞護猛獸自退終不害巳操存默想一其志慮念此眞經則心與道俱山神衞護故獸不爲害引證唐李惟玉常誦玉皇經値安祿山亂伏荒草中虎狼不害及賊將至思得着履以走俄有物落其背視之乃新履一雙也因得免難若入江海採寶求珍値遇惡風如法持念是此眞經風浪頓止安稳逹岸如法持念如經中受持之法而䖍誦之或北面跪誦或東向坐誦則風恬浪靜安稳可達岸也引証會稽人陳璟信道甚篤一日過錢塘江陡値暴風波濤𣳸湧舟中之人無不驚駭股慄璟但至誠默念玉皇經俄見急流中有一赤龍橫出扶舟方得泊岸若在軍陣戈戟旣接兩刃相交存心默念是此眞經是諸惡賊悉自退散存心至心也對敵非朗誦之時故宜默念蓋持經之人天神衞護軍威自振所以惡賊退散引証雲中太守甯勉篤信大道常持誦玉皇經一日有賊兵犯境勉欲空邑以走恐得罪於天子欲堅壁以守又恐一邑生靈爲賊所屠憂危無計忽探者報云賊且潰矣有遺粟甲械在城下願往取之勉登垣望時見賊兵顚踣若有勁兵擊其後者勉大喜開門逐之生擒數十人問之皆曰向見城上有巨人百餘身長數丈猙𤢆可懼某等盡驚駭汗流甯有鬬心乎勉悟巨人卽經中所謂飛天神王類也若在牢獄枷鎖之中淨心定慮存念是經冤枉自伸卽得解脫修善誦經謹守法度豈遭牢獄枷鎖然或因他人拖累或爲國帑未完致令監禁者亦常有之所謂无妄之災非自作之孼也淨心内念不生定慮外緣不擾祇知誠意念經無懼禍希福之見也冤枉自伸積誠久而感應通或逢皇恩赦免或遇清官開釋不待辯白而自伸也引証宋崔節度使軍法嚴峻有校宋懿衙參失時崔命按軍法斬轅門外是夕三鼓懿復還家妻子大駭疑爲鬼矣懿曰我初戮時一如醉睡無諸痛苦至今方醒因以歸家遲明入謝崔驚懼曰汝有何妖術能致不死懿曰惟自幼持玉皇經日誦一部昨因誦經是以衙參過期崔令取經至扃鎖如故開匣視之經分兩段崔深自悔責卽捐資命工寫金字玉皇經百部永充供養若爲邪精鬼賊眾苦所加如法持念是此眞經眾邪遠避自然安稳邪中之精鬼中之賊人被其害眾苦畢集焉能諷誦如法持念者乃延請端人法士代爲諷誦耳引証進士于季囘篤信皇經日誦一部春日詣村大醉夜深不及囘家投宿旅店閑步月下見一婦人顏色甚異因與言語遂被誘去行十餘里至一村舍又有五六女子笑語相迎季囘因思村舍安得有此疑是妖魅乃朗誦帝誥口吐金光羣女驚走惟聞腥臊之氣蓋狐狸穴也正徬徨間俄有白鹿在前引導遂得還若人爲求嗣息如法尊重持念此經帝勅天曹明檢丹籍九品之内四果仙人運應數合降謫下生爲其作子才辯明慧人中尊貴丹籍丹書仙籍九品上乘三品中乘三品下乘三品四果須陀洹果斯陀含果陀那含果阿羅漢果運應輪轉數合臨凡者帝命爲持經人作子才辯者才不可羈也明慧者明無不照也德位兼隆人中尊貴引証宋胡汝賢五十無子每旦誦禮皇經䖍誠祈禱妻歐陽氏夢道士抱嬰兒付之覺而有孕生一子聰明穎異少年登第若婦人臨難之月如法持念是此眞經卽得母子平安生福德男女人所愛敬臨難生產也婦人不能誦經丈夫如法代誦或延羽士禮誦解厄祈福不但母子平安且所生之男女有福有德爲人親愛敬重引証進士沈球妻陳氏受孕年餘不生發願刋施皇經百部祈保平安刋者捧板至門妻卽分娩母子無恙若爲求官進職爵祿亨達貴遇人君如法持念是此眞經卽得職務遷轉子孫榮貴世世不絕無位者欲求得官有位者欲求進職使爵祿亨達貴遇人君如法持念此經不但宦途如意且子孫相繼簪纓不絕引証安陸衞千戸黃琛久不遷官發願刊印皇經一百二十部以施善信裝釘甫成卽陞正指揮使若人欲求資財殷富如法奉持是此眞經卽得財寶充溢衣食自然慶流子孫傳之後代充溢盈滿也自然不待營求也言持經之人不但身享饒裕且能使美利傳之無窮也引証吳興林榮本貿易人篤信至道傾家資刊刻皇經印施一日鋤地得金一窖遂成巨富子孫世守若人被諸惡星之所照臨困苦牀枕如法持念是此眞經是諸惡星返降吉祥惡星如計都羅㬋之類困苦牀枕睡牀不安伏枕不甯也如心胸煩躁肢體腫痛皆是返降吉祥疾病退而身安營謀遂而心樂也引証梓州陳文達最敬玉皇經誦及萬卷屢獲吉祥凡鄰里親戚有危惡疾患文達躬往誦經無不立愈人見文達皆生欽敬若人命過應入地獄注名惡籍父母師長夫妻男女爲亡人持念是經或安置道場旛花供養卽得亡者鬼籍盡除神生淨土同苦罪眾咸蒙濟度承斯勝利皆生天上亡者戚屬能爲持念是經固獲利益如或不能則安置道場設旛花陳供養延道流誦經超度則亡者除鬼籍而神歸淨土卽同苦罪眾亦沾餘波而往生天上引証相州范煇爲亡妻梁氏持誦玉皇寶誥極其精勤一日夢中覺身輕舉飛昇上天見彩霞滿佈異香馥郁瓊林寶樹森然羅列傍有一宮額曰梁氏淨室一繡衣童子出范問之曰梁氏何由至此其人安在答曰梁氏得此乃因君持誦帝誥之力也又此經所在之處常有十天至眞大聖無極飛天神王侍衞供養持是經人當得自稱爲正一眞人是人在處自得十方至眞至聖金剛力士潛護其人如護已身若出若入遊行之處百邪避路魔鬼殄除精靈伏藏一切灾殃不能侵近是持經人命欲終時更不見諸地獄惡相卽見天宮玉女持幢下迎而生天上如天福盡下生人間卽得千生萬生中常爲國王大臣聖賢慶會國土清平人民樂業常得夙性通明遵奉大道展轉修持誕登道岸持是經人護福如是十天十方諸天也飛天神王飛行於天之神王也正一眞人至正無私誠一無二之人也金剛力士釋道兩教之護法也潛護暗中保護也不正者爲邪畔道者爲魔山妖木魅皆具精靈能爲人害避路殄除伏藏此灾殃之所以不能侵近也幢旛屬千生萬生猶言千世萬世聖賢慶會明良相遇之時也清平樂業持經之利及於國土人民也宿性通明靈根不昧也展轉修持厯劫不懈也登岸卽佛典到彼岸之意如是種種功德皆誦天經之效而獲夙性通明則尤爲難得蓋人身厯輪迴此一世心奉大道精進修持到那一世或耽溺塵緣迷失前生本性昏昏碌碌無復向來通明此修道所以要不失本來種子能得夙性通明則世世生生不違眞性矣證道成眞舍此其誰故此一端爲功德中之尤者引証唐竇夫人常持誦玉皇經一日誦未終卷而故疾舉發夫人自念倘病不起不能終經矣强起令婢燃燈婢云無火正歎恨間俄三清堂中有燭炬出漸次升堂直入卧内一室明朗夫人驚喜取經誦之頓失所苦後享夀九十有五將卒異香馥郁仙樂競奏鄰人皆見金童玉女手持幢旛寶蓋引夫人上昇云又若有持是經人若雨下時起大悲心如法向空念此經三卷一遍其雨所霑面所向方一切眾生五逆十惡一切重罪悉皆消滅一切重病自得痊愈是諸眾生命終之後不墮地獄神生淨土蓮花化生何况受持是此經者面所向方持經之人其面所向處也五逆不忠不孝不悌不仁不義十惡心三業貪嗔癡身三業殺盜淫口四業兩舌惡口綺語妄言共成十惡蓮花化生西方極樂世界人無女流不假精血成胎魂托蓮花而生或云五逆十惡王法在所不赦而經之功德亦以被之似可不必不知此等重罪眾生前生夙世種諸罪根徧厯三塗業滿轉生爲人所以眞性全迷孽芽復發不得此大法寶徧灑甘霖何由洗除業根脫離惡報故度大惡人專賴是經引証通事舍人張承福受持玉皇經一日被冥司所追承福至誠默誦是經見所追鬼卒及一切受罪諸鬼皆昇空而去承福後享長年又若有持是經人或行於道路値大風起吹是持經之人觸身之塵是塵所霑一切眾生一切惡業悉皆消滅更不墮於三惡道當生天上故知持經功德不可思議不可思議不可思量擬議也此連上節並下八節極言持經利及人物之功德愈推愈微總發明不可思議之意是持經人若涉江河淮海沐浴其身是身所霑之水其中眾生魚鱉黿鼉一切水族是諸惡業悉皆除滅盡此一報之身命過之後不復更受胎卵濕化一切等身罪業深重方墮水族今沾持經人功德水則惡業除滅盡此一報而已不復更受四生輪轉或云水族沾持經人之四德水便不更化水族何以鱗介生生不息此說恐未必然不知此節乃指一處而言如在一池沐浴則此池水族盡化往生非在一池而遍及乎四海也且此一時沐浴則此一時水族獲佑過此而後濕者又生作惡者又投於此則水中安得絶無鱗介固不得執此見以議大功德也引証唐乾符中有羽士失其名日持玉皇經未嘗暫廢一日舟泊白帝城夜深寂靜持念之際忽聞腥穢之氣見水面有一人逼近船來驚問之答曰我非人也姓許名道坤爲夔州牧以貪殘暴虐死受業報爲灩澦灘毒蟒之子已二十餘年聞師持課得受利益往生人道故來相謝是持經人口出一切言語音響一切邪魔外道聞者皆是清淨法音持經之人口中常出金光故言語音響一切邪魔外道聞之俱是清淨解脫之法音是持經人若遇諸神廟能爲其神誦咏是經是諸鬼神得聞是經卽脱鬼趨登證仙道恭敬是人如奉是帝爲神誦經神卽脫離鬼趨趨者道也蓋神雖具威靈彰報應尚未離乎鬼道聞此眞經則五蘊皆空而上證眞仙矣故恭敬持經之人如奉説經之帝也引証唐開元中有王少府者欽崇大道曾誦玉皇經萬遍一日見二鬼使來追隨行十數里至一大樹下二使坐憩少府忽憶玉皇經閉目誦之纔一部顧二使並失須臾四人至跪吿曰仁者修行有此利益向來追君二使已生天矣少府曰吾但誦玉皇經耳四人叩頭曰惟此功德故也請爲弟子誦之少府誦之部半開目又不見四人所在但聞空中曳甲聲有一紫衣神侍衞甚雄跪言曰吾是五道冥官任重且貴但未離鬼道願求生天請同至弟子處誦之冀福蔭之餘也少府相隨至一陂澤乃拷掠訊鞫之所神因叠石爲座與諸部眾長跪座下合掌聽之少府誦之三卷誦畢四顧並無一人惟有斷繩破杻敝鎖空枷而已驚悚罔知所適忽有四童子來云王請公速囘亂我冥府文簿釋我獄中罪囚因導少府至一空谷中遂生若人在世不孝父母不敬三寶殺生偷盜邪淫妄語作種種極重罪業將命終時若有道心正信善男善女於亡者未氣終時起大悲心於其頭邊念玉帝尊號七遍或二七遍三七遍四七遍乃至百遍千遍是其亡者生前所造諸不善業悉得消滅更不墮諸惡趨神昇九天何况受持是此經者道心正信具向道之心正而不偏信而不二也着眼全在此句故爲亡者持念尊號必須善男善女引証唐開元中盧重誨晝寢夢二青衣持帖來追隨行數里見一門牆甚高峻問此何地青衣曰此御史大夫李某宅也盧驚喜曰吾表兄也因入見之李問云君夀已盡未審平日有何善功答曰在生常誦玉皇經李云此經乃聖神之骨髓功德最大盧囘顧庭院左右鐵網中有衣冠之士數十輩頂禮哀吿盧問此何等人李曰此皆不孝父母不敬三寶殺生偷盜邪淫妄語作種種不善者死後䧟鐵網中無有解脫君經功甚大可爲持誦令脫苦趨亦君之福利也遂設金牀令盧持誦盧念至神呪品見網中罪囚已有出頭者經終全身俱出拜謝而去盧亦還生再延福夀又若復有人自從往劫乃至今生輪轉人天漂沉世域積千愆萬過在於已身若遇是持經之人形影暫映其身如爲帝光之所攝受或與同語或聞其聲如奉上帝道語之所慰諭彼人罪障永得除滅輪轉如車輪之旋轉人天享人間福如居天上也指富貴者而言此等人積千愆萬過若遇持經人形影暫時映照如爲帝光之所接引一般或與持經人共語或聞持經人聲音如奉上帝道言法語之所撫慰溫諭而罪障悉消焉又若持是經人造作長旛書帝名號於其旛上懸諸長竿或在觀宇或在家庭是旛被諸風吹所指方面一切眾生皆霑勝利一切惡業悉皆除滅此節言書寫帝號形影所及普利無窮又若有持是經人書帝名號在一切有聲物上或鐘或磬鈴鐺鐃鈸一切道具法事之屬或作道場或因試擊或被風觸是聲出時或遠或近一切眾生聞是聲已所有罪業悉得清淨此節言書寫帝號聲音所及普利無窮道具法事道家之具法會之事也又若有持是經人了悟生死深入山林修眞學道或時登臨上山顧望目所及處山林溪谷含生品彙有形無形胎卵濕化蠢動飛潛種種物類所有罪業皆得除滅身心清淨命終生天何况受持是此經者當知是人卽是道藏功德身也了悟生死明徹生死根源也修眞學道修煉眞性學習大道也山林溪谷間含生之品類若有形若無形若胎卵濕化若蠢動飛潛種種物類所有罪業持經之人目所及處俱得解脱則知是人乃大道之藏無盡量功德之身也由此經所在以下至此極言眞經能消一切罪業而不可思議功德仍屬持經之人玩各節俱以何况受持是此經者作結可見以上厯言功德種種如是而或疑其過涉張皇亦竊見有誦經者未曾見此功德嗚呼此管蠡之見也所謂持經者非一暴十寒之謂非口誦心違之謂非貌誠志怠之謂乃心如其口口如其心念念不懈時時不忘卽不誦時而閉目凝神將這部經參前倚衡這方呌做能持是經果能如是功德其本分事耳何庸漫疑而妄議耶爾時天尊謂玉虛帝君言今我略説未盡其妙若廣説之凡流邪見疑惑不信是經功德窮劫難言持經功德不過宣其大略尚未盡其微妙若廣説之則凡庸之流偏邪之見反疑惑不信矣况是經功德窮劫難言雖廣説之亦有不能盡者於是玉虛帝君聞是說已心生歡喜不勝踴躍瞻仰慈顏稽首讚歎而作頌曰九天之上謂之大羅玉京金闕雲層峩峩中有天帝仁慈惠和至道無敵降伏眾魔天寶靈符玉律金科神仙億萬幢旛眾多聞者罪滅永出愛河是號玉皇穹蒼眞老妙圓清淨智慧辯才至道至尊三界師混元祖無能勝主四生慈父高天上聖大慈仁者十號圓滿萬德周身無量度人拔生死苦慈顏謂玉帝大羅京闕祥雲層覆峩峩然高峻也中有萬天帝主仁慈惠和至道無與相敵而降伏眾魔也天寶靈符五帝眞誥也玉律金科天律金格也神仙億萬幢旛眾多侍宸眞聖持旌節而護衞之聞者罪滅永出愛河法音所及皆解脱而登彼岸也是以號稱玉皇爲穹蒼之眞老妙圓清淨微妙圓通眞清眞淨也智慧辯才大智大慧妙辯宏才也至道道高無極至尊位尊無對化行宇宙無物或遺誠三界之明師無始之先帝眞已具乃混元之宗祖神眞仙佛莫與嫓美故曰無能勝主胎卵濕化俱沐生成故曰四生慈父居彌羅之天高而無上謂之高天上聖具慈悲之心仁育萬類謂之大慈仁者由穹蒼眞老至此是爲十號無所不全是爲圓滿萬德周於一身度人不可限量此所以能拔生死苦也爾時玉虛帝君說是頌及十號已諸天聖眾異口同音歎未曾有歎未曾有言玉帝聖號厯劫以來未之有也謂總承功德者非高上玉皇本行集經巻中收讚光明咒品拔濟無邊玉皇功德妙難宣錫福更消愆普度人天修奉結良緣大聖玉皇滿願大天尊三稱三拜
