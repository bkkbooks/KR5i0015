body:
  text: 高上玉皇本行集經玉皇本行集經序文昌帝君曰天人不外一理古今祇此一心若理之所不順卽心之所不安雖帝典王謨不妨修飾之潤色之期於理順心安而止玉皇本行集經由洞玄而變爲高上累經筆削率土善信俱奉爲作聖之階梯成眞之津筏矣然大文不無傳習之訛註疏亦多謬解之弊以致辭意矛盾章節混淆有心斯道者斷不容不稍爲參酌者也是刻謹照九天秘書玉函正文共訂政一百十八字詞取其顯意取其明分章分節脈絡貫通註亦就經解經不落玄杳虛無陋習學者試取世本同觀而共玩焉孰得孰失不待言而自明倘仍執一成之見謂經不當改而改經者之適足以取罪則是天人有異理古今有異心矣斷乎不然玉皇本行集經序孚佑帝君曰經以載道有經而道始顯註以闡經有註而經始明道固賴有經也而經尤賴有註欲道顯而經明舍註無由也玉皇本行集經所言者盡人合天之功成已成物之理其意深其旨遠苟非有註以表章之則後學之人何所緣而入聖眞之路乎然行遠者必先自邇登高者必先自卑置其卑者邇者而圖其高者遠者玄門中無躐等之學也葢作經者有文中之意有意中之文以在天之玉皇譬在人之玉皇心之有主者卽爲帝座身之從令者便是諸眞此文中之意高且遠者也天尊憑几而錫命淸眾侍側而請業放十七大光明聖凡解脫成三十種功德人鬼超昇此意中之文邇且卑者也卑邇者人之所可知高遠者人之所不可知發明其所可知俾讀者了然於心目之間而其所不可知者俟讀者靜會於言之外層累而升由漸而入則道於此顯經於此明成眞作聖於此而得路若夫侈陳虛無高談𣺌冥叢雜蕪穢使誦習之士煩悶厭倦揜卷而不欲竟其觀殊非覺源諸子付梓之心亦非予傳註之心也刻成行世願淸淨身心䖍誠諷誦仰叨上帝鑒觀福有攸歸矣
